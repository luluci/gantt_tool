<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ガント</title>
  <script>
    window.__GANTT_DATA__ = null;
    window.__GANTT_DATA_LOADED__ = false;
  </script>
  <script src="gantt_data.js" onerror="window.__GANTT_DATA_LOADED__=false;"></script>
  <script>window.__GANTT_DATA_LOADED__ = !!window.__GANTT_DATA__;</script>
  <style>
    :root {
      --border: #c8c8c8;
      --bg-top: #f4f4f4;
      --bg-darkcol: #3a3f45;
      --bg-cell: #fff;
      --accent: #2a6fbb;
      --selected: #fff3bf;
      --actual-bar: #444;
      --holiday-sat: #e9f6ff;
      --holiday-sun: #ffeef0;
      --holiday-strong: #ffd7dc;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      --cal-head-row-h: 20px;
      --tree-head1-w: 250px;
      --tree-head2-w: 100px;

      --bg-header: #2f4cac;
      --bg-domain: #404050;
      --bg-project: #707080;
      --bg-version: #c8c8c8;
      --color-domain: #fff;
      --color-project: #fff;
      --color-version: #41205f;

      --z-index-comment: 109;
      --z-index-comment-line: 108;
      --z-index-header-caption: 99;
      --z-index-header: 98;
      --z-index-header-calendar: 97;
      --z-index-body-caption: 89;
      --z-index-body: 88;
      /* 入力ペイン */
      --z-index-input-tool: 19;
      --z-index-input-domain: 18;
      --z-index-input-project: 17;
      --z-index-input-version: 16;
      --z-index-input-task: 15;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); font-size: 13px; }
    #app { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    #topPane {
      flex: 0 0 var(--topH, auto); background: var(--bg-top); border-bottom: 1px solid var(--border);
      padding: 8px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; overflow: auto;
    }
    .topBlock { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    .topBlock label { font-weight: 600; font-size: 11px; color: #333; }
    .listbox {
      height: 110px; min-width: 120px; border: 1px solid var(--border); padding: 2px;
      overflow: auto; background: #fff;
    }
    .listbox option { padding: 2px 4px; }
    .rowBtns {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .rowBtns input[type="text"] {
      width: 100px;
    }
    .listManageBody { display: flex; gap: 6px; align-items: flex-start; }
    .listManageBtns { display: flex; flex-direction: column; gap: 4px; min-width: 110px; }
    .listManageBtns input[type="text"] { width: 110px; }
    #hResizer {
      flex: 0 0 6px; cursor: row-resize; background: #e0e0e0;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    #bottomPane { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
    #leftPane {
      flex: 0 0 var(--leftW, 340px); min-width: 200px; max-width: 70%;
      border-right: 1px solid var(--border); overflow: auto; background: #fafafa;
    }
    #leftPane.hidden { display: none; }
    #leftPane button.deleteBtn {
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      padding: 0 3px 2px 3px;
      border: 1px solid #ff4040;
      border-radius: 5px;
      background: #ff4040;
    }
    .inputPaneHeader {
      /* display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 6px; */
      display: grid;
      grid-template-columns: 1fr 100px;

      font-weight: 600;
      margin: 0;
      padding: 6px;

      & .inputPaneHeaderTitle {
        grid-column: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      & .inputPaneHeaderTool {
        grid-column: 2;

        display: flex;
        flex-direction: row;
        justify-content: flex-end;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;

        & button {
          white-space: nowrap;
        }
      }
    }
    .inputPaneToolHeader {
      background: var(--bg-header);
      border-color: 3a68ff;
      color: #fff;

      position: sticky;
      top: 0;
      z-index: var(--z-index-input-tool);
    }
    .inputPaneDomain {
      margin: 0;
      padding: 0;
    }
    .inputPaneDomainHeader {
      background: var(--bg-domain);
      border-color: var(--bg-domain);
      color: var(--color-domain);

      position: sticky;
      z-index: var(--z-index-input-domain);
    }
    .inputPaneProject {
      margin: 0;
      padding: 0;
    }
    .inputPaneProjectHeader {
      background: var(--bg-project);
      border-color: var(--bg-project);
      color: var(--color-project);

      position: sticky;
      z-index: var(--z-index-input-project);
    }
    .inputPaneVersion {
      margin: 0;
      padding: 0;
    }
    .inputPaneVersionHeader {
      background: var(--bg-version);
      border-color: var(--bg-version);
      color: var(--color-version);

      position: sticky;
      z-index: var(--z-index-input-version);
    }
    .inputPaneTask {
      margin: 0;
      padding: 0;
    }
    .inputPaneTaskHeader {
      background: #ddd;
      border-color: #ddd;

      position: sticky;
      z-index: var(--z-index-input-task);
    }
    .inputPanePlan {
      margin: 4px;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .inputPanePlanHeader {
      padding: 0;
    }
    .inputPanePlan table.hourTable {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .inputPanePlan table.hourTable tr.hourTableHeaderRow th.hourTableHeaderLabel {
      width: 50px;
      padding: 2px 4px;
      background: #eee;
      border: 1px solid var(--border);
    }
    .inputPanePlan table.hourTable tr.hourTableHeaderRow th {
      width: 30px;
      padding: 2px 4px;
      background: #eee;
      border: 1px solid var(--border);
    }
    .inputPanePlan table.hourTable tr.hourTableRow td {
      border: 1px solid var(--border);
      padding: 0px;
      text-align: right;
    }
    .inputPanePlan table.hourTable tr.hourTableRow td input {
      width: 100%;
      box-sizing: border-box;
      font-size: 12px;
    }
    .inputPanePlan table.hourTable td.hourTableLabel {
      background: #eee;
      border: 1px solid var(--border);
      padding: 4px !important;
    }
    .inputPanePlan.selected {
      background: var(--selected);
    }

    .dateTable {
      width: 100%;
      border-collapse: collapse;
      margin: 4px 0;
    }
    .dateTable th, .dateTable td {
      border: 1px solid var(--border);
      padding: 1px;
      text-align: left;
    }
    .dateTable th {
      background: #eee;
      font-weight: bold;
    }
    .dateTable input {
      width: 100%;
      box-sizing: border-box;
      font-size: 12px;
    }
    .dateTable .dateTableHeader {
      width: 50px;
      text-align: center;
      border: 1px solid var(--border);
      padding: 2px 4px;
      background: #eee;
      font-weight: bold;
    }

    #resizer {
      flex: 0 0 6px; cursor: col-resize; background: #e0e0e0; border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    #resizer.hidden { display: none; }
    #rightWrap { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    #ganttVScroll { flex: 1 1 auto; overflow: auto; min-height: 0; }
    .ganttStage { position: relative; width: max-content; min-width: 100%; }
    .commentLayer {
      position: absolute; left: 0; top: 0; pointer-events: none;
      z-index: var(--z-index-comment);
    }
    .commentLineLayer {
      position: absolute; left: 0; top: 0; pointer-events: none;
      z-index: var(--z-index-comment-line);
    }
    .commentCard {
      position: absolute; min-width: 160px; max-width: 220px; padding: 4px 6px;
      background: #fffef3; border: 1px solid #d7cfa2; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      font-size: 11px; white-space: pre-wrap; word-break: break-word; cursor: move; pointer-events: auto;
    }

    table.gantt {
      border-collapse: collapse; table-layout: fixed;
    }
    table.gantt th {
      padding: 2px 4px; vertical-align: middle;
    }
    table.gantt td {
      border: 1px solid var(--border);
      padding: 2px 4px;
      vertical-align: middle;
    }

    table.gantt thead {
      position: sticky;
      top: 0;
      z-index: var(--z-index-header);
    }
    table.gantt thead th,
    table.gantt thead td {
      position: sticky;
      z-index: var(--z-index-header);
      border-color: transparent;
    }
    table.gantt thead th::before,
    table.gantt thead td::before {
      content: "";
      position: absolute;
      inset: -1px -1px 0 0;
      background: inherit;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      pointer-events: none;
      z-index: -1;
    }
    table.gantt thead tr:first-child th::before {
      border-top: 1px solid var(--border);
    }
    table.gantt thead th:first-child::before {
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calYear th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calMonth th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calDay th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calWeek th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead th.treeHead, table.gantt thead th.treeHead2 {
      z-index: var(--z-index-header-caption) !important;
    }
    .dayHead {
      width: 28px; height: var(--cal-head-row-h); font-size: 10px; line-height: 1.1; text-align: center; background: #eaeaea; font-weight: 500; padding: 1px 0;
    }
    table.gantt thead tr.calYear th.dayHead,
    table.gantt thead tr.calMonth th.dayHead {
      text-align: left;
      padding-left: 0;
    }
    .calStickyLabel {
      position: sticky;
      left: calc(var(--tree-head1-w) + var(--tree-head2-w));
      display: inline-block;
      padding-left: 6px;
      white-space: nowrap;
      z-index: var(--z-index-header-calendar) !important;
    }
  
    .manhoursRow td.treeHead {
      font-weight: bold;
    }
    .manhoursRow td.daycell {
      background: #f5f5f5;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      height: var(--cal-head-row-h);
      
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    .manhoursHeader td.treeHead {
      background: var(--bg-header);
      border-left: 1px solid var(--border);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      z-index: var(--z-index-header-caption) !important;
    }
    .manhoursHeader td.daycell {
      background: var(--bg-header) !important;
      border-color: var(--bg-header) !important;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .manhoursCaseDetailRow td.treeHead {
      background: #e4d7bf;
        border-left: 1px solid var(--border);
        z-index: var(--z-index-header-caption) !important;
    }
    .manhoursCaseDetailRow td.daycell {
      background: #e4d7bf !important;
      height: var(--cal-head-row-h);
    }
    .manhoursDomainDetailRow td.treeHead {
      background: #d7e4bf;
      border-left: 1px solid var(--border);
      z-index: var(--z-index-header-caption) !important;
    }
    .manhoursDomainDetailRow td.daycell {
      background: #d7e4bf;
      height: var(--cal-head-row-h);
    }
    .manhoursMemberDetailRow td.treeHead {
      background: #bfd7e4;
      border-left: 1px solid var(--border);
      z-index: var(--z-index-header-caption) !important;
    }
    .manhoursMemberDetailRow td.daycell {
      background: #bfd7e4 !important;
      height: var(--cal-head-row-h);
    }

    table.gantt tbody {
      margin: 0; padding: 0;
    }

    .daycell {
      width: 28px; height: 22px; padding: 0; text-align: center; font-size: 12px; vertical-align: top;
    }
    .daycell.dark { background: var(--bg-darkcol); color: #bbb;  }
    .daycell .fill { display: block; height: 100%; width: 100%; min-height: 18px; box-sizing: border-box; margin: 0; padding: 0; }

    .dpvRow td {
      height: 25px;
    }
    .dpvRow td.treeHead {
      font-weight: 700;
      border: none;
    }
    .dpvRow td.daycell {
      border: none;
    }
    .dpv-domain td { background: var(--bg-domain); border-color: var(--bg-domain); color: var(--color-domain); }
    .dpv-project td { background: var(--bg-project); border-color: var(--bg-project); color: var(--color-project); }
    .dpv-version td { background: var(--bg-version); border-color: var(--bg-version); color: var(--color-version); }
    
    .treeHead {
      width: var(--tree-head1-w); background: #eee; position: sticky; left: 0;
      z-index: var(--z-index-body-caption) !important;
      border-color: inherit;
    }
    .treeHead2 {
      width: var(--tree-head2-w); background: #eee; position: sticky; left: var(--tree-head1-w);
      z-index: var(--z-index-body-caption) !important;
      border-color: inherit;
    }
    .planRow th,
    .planRow td {
      position: sticky;
      z-index: var(--z-index-body);
      border-color: transparent !important;
    }
    .planRow th::before,
    .planRow td::before {
      content: "";
      position: absolute;
      inset: -1px -1px 0 0;
      background: inherit;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      pointer-events: none;
      z-index: -1;
    }

    .planRow.selected td.daycell {
      box-shadow: inset 0 2px 0 var(--accent), inset 0 -3px 0 var(--accent);
    }
    .daycell .actual {
      height: 3px; margin-top: 1px; background: var(--actual-bar); border-radius: 1px;
    }
    .nameCell { cursor: pointer; }
    .nameCell textarea  {
      field-sizing: content;
      box-sizing: border-box;
    }
    .planRow.selected td.treeHead,
    .planRow.selected td.treeHead2 {
      background: var(--selected);
    }

    .muted { color: #666; font-size: 11px; }
    button { cursor: pointer; }
    .treeRow { background: #fff; }
    .indent { padding-left: 6px; }
    .planFields { display: flex; flex-direction: column; gap: 6px; font-size: 11px; margin: 4px 0 4px 4px; }
    .planRowH { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px 8px; }
    .planRowH label { display: flex; flex-direction: column; gap: 1px; font-size: 10px; white-space: nowrap; }
    .planRowH input, .planRowH select { font-size: 11px; max-width: 9em; }
    .saveBar { display: flex; align-items: center; gap: 8px; }
    .actionBar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      width: 140px;
      min-width: 140px;
    }
    .actionBar button {
      width: 100%;
      text-align: left;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topPane"></div>
    <div id="hResizer"></div>
    <div id="bottomPane">
      <div id="leftPane"></div>
      <div id="resizer"></div>
      <div id="rightWrap">
        <div id="ganttVScroll"></div>
      </div>
    </div>
  </div>
  <script>
(function () {
  function toDateString(date) {
    const d = date instanceof Date ? date : new Date(date);
    const diff = d.getTimezoneOffset() * 60 * 1000;
    const adj = new Date(d.getTime() - diff);
    return adj.toISOString().slice(0, 10);
  }
  function parseYMD(s) {
    if (!s) return null;
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s));
    if (!m) return null;
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }
  function addDays(ymd, n) {
    const d = parseYMD(ymd);
    if (!d) return ymd;
    d.setDate(d.getDate() + n);
    return toDateString(d);
  }
  function daysBetween(a, b) {
    const da = parseYMD(a), db = parseYMD(b);
    if (!da || !db) return 0;
    return Math.round((db - da) / 86400000);
  }
  function uid() { return "id_" + Math.random().toString(36).slice(2, 10); }

  /** plan セル内の左右端判定（ドラッグの resize と同じ幅） */
  const PLAN_CELL_EDGE_PX = 8;

  function emptyData() {
    return {
      phases: ["all"],
      cases: [],
      members: [],
      statuses: [{ id: "st_open", name: "Open" }],
      commonHolidays: [],
      domains: [],
    };
  }

  function migratePlanCellsToDayModel(pl) {
    // 互換性処理
    const u0 = pl.utilization == null ? 1 : Number(pl.utilization);
    Object.keys(pl.cells || {}).forEach((ds) => {
      const c = pl.cells[ds];
      if (c == null || c === true) {
        if (c === true) pl.cells[ds] = {};
        return;
      }
      if (typeof c !== "object") {
        delete pl.cells[ds];
        return;
      }
      // 稼働率
      if (typeof c.util === "number") {
        if (u0 == c.util) {
          c.util = {};
        } else {
          c.util = { value:u0 };
        }
      }
      pl.cells[ds] = c;
    });
  }

  function normalizeLoaded(raw) {
    const d = raw && typeof raw === "object" ? raw : emptyData();
    if (!Array.isArray(d.phases)) d.phases = ["all"];
    if (!d.phases.includes("all")) d.phases = ["all"].concat(d.phases.filter((p) => p !== "all"));
    if (!Array.isArray(d.cases)) d.cases = [];
    if (!Array.isArray(d.members)) d.members = [];
    if (!Array.isArray(d.statuses)) d.statuses = [{ id: "st_open", name: "Open" }];
    if (!Array.isArray(d.commonHolidays)) d.commonHolidays = [];
    if (!Array.isArray(d.domains)) d.domains = [];
    d.domains.forEach((dom) => {
      dom.cells = dom.cells && typeof dom.cells === "object" ? dom.cells : {};
      dom.projects = dom.projects || [];
      dom.projects.forEach((pr) => {
        pr.cells = pr.cells && typeof pr.cells === "object" ? pr.cells : {};
        pr.versions = pr.versions || [];
        pr.versions.forEach((vr) => {
          vr.cells = vr.cells && typeof vr.cells === "object" ? vr.cells : {};
          vr.tasks = vr.tasks || [];
          vr.tasks.forEach((tk) => {
            tk.plans = tk.plans || [];
            tk.plans.forEach((pl) => {
              pl.utilization = pl.utilization == null ? 1 : Number(pl.utilization);
              pl.phaseHours = pl.phaseHours || {};
              pl.cells = pl.cells || {};
              if (pl.statusId === undefined) pl.statusId = d.statuses[0] && d.statuses[0].id || null;
              migratePlanCellsToDayModel(pl);
              d.phases.forEach((ph) => {
                if (!pl.phaseHours[ph]) pl.phaseHours[ph] = { planned: 0, actual: 0 };
              });
            });
          });
        });
      });
    });
    return d;
  }

  function cloneForSave(data) {
    return JSON.parse(JSON.stringify(data));
  }

  function serializeJs(data) {
    return "window.__GANTT_DATA__ = " + JSON.stringify(data, null, 2) + ";\n";
  }

  /** phase 工数はフォームから直接編集（all 以外は管理用・チャート非表示） */
  function syncPhaseTotalsFromField(state, plan, phaseId, field, newNum) {
    const ph = plan.phaseHours;
    if (!ph[phaseId]) ph[phaseId] = { planned: 0, actual: 0 };
    ph[phaseId][field] = Math.max(0, Number(newNum) || 0);
  }

  function ensurePhaseKeys(state) {
    const phases = state.data.phases;
    state.data.domains.forEach((dom) =>
      (dom.projects || []).forEach((pr) =>
        (pr.versions || []).forEach((vr) =>
          (vr.tasks || []).forEach((tk) =>
            (tk.plans || []).forEach((pl) => {
              pl.phaseHours = pl.phaseHours || {};
              phases.forEach((ph) => {
                if (!pl.phaseHours[ph]) pl.phaseHours[ph] = { planned: 0, actual: 0 };
              });
              Object.keys(pl.phaseHours).forEach((k) => {
                if (!phases.includes(k)) delete pl.phaseHours[k];
              });
            })
          )
        )
      )
    );
  }

  function cellIsOn(plan, dateStr) {
    const c = plan.cells[dateStr];
    if (c == null) return false;
    if (typeof c !== "object") return false;
    const rawKeys = Object.keys(c);
    const keys = rawKeys.filter((k) => k === "util");
    if (keys.length === 0) return false;
    return true;
  }

  function effectiveCellUtil(plan, dateStr) {
    const c = plan.cells[dateStr];
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    if (!cellIsOn(plan, dateStr)) return u0;
    if (c && typeof c === "object" && c.util != null) return Number(c.util.value) || u0;
    return u0;
  }

  /** チャート表示・all 集計用（1日=8hr×稼働率） */
  function dayHoursAll(plan, dateStr) {
    return cellIsOn(plan, dateStr) ? 8 * effectiveCellUtil(plan, dateStr) : 0;
  }

  function displayedHoursForDate(plan, dateStr) {
    return dayHoursAll(plan, dateStr);
  }

  function hasDisplayedHours(plan, dateStr) {
    return cellIsOn(plan, dateStr);
  }

  function recomputeAllPhaseFromCells(plan) {
    const keys = Object.keys(plan.cells || {});
    let sumAll = 0;
    keys.forEach((ds) => {
      sumAll += dayHoursAll(plan, ds);
    });
    if (!plan.phaseHours.all) plan.phaseHours.all = { planned: 0, actual: 0 };
    if (keys.length > 0) plan.phaseHours.all.planned = sumAll;
  }

  function isWeekendYMD(ymd) {
    const d = parseYMD(ymd);
    if (!d) return false;
    const w = d.getDay();
    return w === 0 || w === 6;
  }

  function weekendTypeYMD(ymd) {
    const d = parseYMD(ymd);
    if (!d) return "";
    const w = d.getDay();
    if (w === 6) return "saturday";
    if (w === 0) return "sunday";
    return "";
  }

  function holidayTypeForDate(ymd, plan, state) {
    const mem = state.data.members.find((m) => m.id === plan.ownerId);
    if (mem && Array.isArray(mem.holidays) && mem.holidays.includes(ymd)) return "member";
    if (state.data.commonHolidays.includes(ymd)) return "common";
    return weekendTypeYMD(ymd);
  }

  function holidayTypeForHeaderDate(ymd, state) {
    if (state.data.commonHolidays.includes(ymd)) return "common";
    return weekendTypeYMD(ymd);
  }

  function holidayBgColor(type) {
    if (type === "member") return "var(--holiday-strong)";
    if (type === "common") return "var(--holiday-strong)";
    if (type === "sunday") return "var(--holiday-sun)";
    if (type === "saturday") return "var(--holiday-sat)";
    return "";
  }

  function isHolidayDate(ymd, plan, state) {
    return !!holidayTypeForDate(ymd, plan, state);
  }

  function capacityForDate(plan, ymd, state) {
    if (isHolidayDate(ymd, plan, state)) return 0;
    return 8 * (plan.utilization || 1);
  }

  function totalPlannedHours(plan, state) {
    return Number((plan.phaseHours.all && plan.phaseHours.all.planned) || 0);
  }

  function computePlannedEnd(plan, state) {
    const start = plan.plannedStart;
    if (!start) return "";
    const total = totalPlannedHours(plan, state);
    if (total <= 0) return start;
    let remain = total;
    let d = parseYMD(start);
    if (!d) return "";
    let last = toDateString(d);
    while (remain > 1e-6) {
      const ds = toDateString(d);
      const cap = capacityForDate(plan, ds, state);
      if (cap > 0) {
        const use = Math.min(cap, remain);
        remain -= use;
        last = ds;
      }
      d.setDate(d.getDate() + 1);
      if (d.getTime() - parseYMD(start).getTime() > 86400000 * 3650) break;
    }
    let maxCell = start;
    Object.keys(plan.cells).forEach((ds) => {
      if (cellIsOn(plan, ds)) {
        if (daysBetween(start, ds) > daysBetween(start, maxCell)) maxCell = ds;
      }
    });
    return daysBetween(last, maxCell) >= 0 ? maxCell : last;
  }

  function earliestInputCellDate(plan) {
    let minDate = null;
    Object.keys(plan.cells || {}).forEach((ds) => {
      if (!cellIsOn(plan, ds)) return;
      if (!minDate || daysBetween(ds, minDate) > 0) minDate = ds;
    });
    return minDate;
  }

  function eachPlan(state, fn) {
    state.data.domains.forEach((dom) =>
      (dom.projects || []).forEach((pr) =>
        (pr.versions || []).forEach((vr) =>
          (vr.tasks || []).forEach((tk) =>
            (tk.plans || []).forEach((pl) => fn(pl, tk, vr, pr, dom))
          )
        )
      )
    );
  }

  function findPlan(state, planId) {
    let out = null;
    eachPlan(state, (pl) => { if (pl.id === planId) out = pl; });
    return out;
  }

  function findTaskForPlan(state, planId) {
    let tk = null;
    eachPlan(state, (pl, t) => { if (pl.id === planId) tk = t; });
    return tk;
  }

  function ensureObjectCells(target) {
    target.cells = target.cells && typeof target.cells === "object" ? target.cells : {};
    return target.cells;
  }

  function getCellComment(target, date) {
    const c = target && target.cells ? target.cells[date] : null;
    if (!c || typeof c !== "object" || !c.comment || typeof c.comment !== "object") return "";
    return String(c.comment.text || "");
  }

  function getCellCommentPos(target, date) {
    const c = target && target.cells ? target.cells[date] : null;
    if (!c || typeof c !== "object" || !c.comment || typeof c.comment !== "object" || !c.comment.pos || typeof c.comment.pos !== "object") return null;
    const x = Number(c.comment.pos.x);
    const y = Number(c.comment.pos.y);
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    return { x, y };
  }

  function setCellCommentPos(target, date, pos) {
    const cells = ensureObjectCells(target);
    let c = cells[date];
    if (!c || typeof c !== "object" || c === true) c = {};
    if (!c.comment || typeof c.comment !== "object") c.comment = { text:"" };
    c.comment.pos = { x: Number(pos.x) || 0, y: Number(pos.y) || 0 };
    cells[date] = c;
  }

  function setCellComment(target, date, text) {
    const cells = ensureObjectCells(target);
    const val = String(text || "");
    let c = cells[date];
    if (!c || typeof c !== "object" || c === true) c = {};
    if (!c.comment || typeof c.comment !== "object") c.comment = { text:"" };
    if (val.trim()) c.comment.text = val;
    else delete c.comment;
    cells[date] = c;
  }

  function commentRefKey(kind, target, date) {
    return kind + ":" + String(target.id || "") + ":" + String(date || "");
  }

  function defaultColorForPlan(plan, state) {
    const m = state.data.members.find((x) => x.id === plan.ownerId);
    return (m && m.defaultColor) || "#8ab4e6";
  }

  function planBarColor(plan, state) {
    return plan.color || defaultColorForPlan(plan, state);
  }

  function cloneCells(cells) {
    return JSON.parse(JSON.stringify(cells || {}));
  }

  function cellVisualKeyFromCell(plan, c) {
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    if (!c || typeof c !== "object") return "off";
    if (c.util == null || c.util.value == null) return "on:" + String(u0);
    const u = Number(c.util.value);
    return "on:" + String(Number.isFinite(u) ? u : u0);
  }

  function buildPlanCellDomCache(planId, dates) {
    const cache = new Map();
    dates.forEach((ds) => {
      const td = ganttVScroll.querySelector('td.daycell[data-plan-id="' + planId + '"][data-date="' + ds + '"]');
      if (td) cache.set(planId + "|" + ds, td);
    });
    return cache;
  }

  function updatePlanCellDomByData(plan, ds, dateCell, cache) {
    const key = plan.id + "|" + ds;
    const td = (cache && cache.get(key)) || ganttVScroll.querySelector('td.daycell[data-plan-id="' + plan.id + '"][data-date="' + ds + '"]');
    if (!td) return;
    const fill = td.querySelector(".fill");
    if (!fill) return;
    const on = !!(dateCell && typeof dateCell === "object" && dateCell.util);
    const holType = holidayTypeForDate(ds, plan, state);
    if (on) {
      td.style.background = planBarColor(plan, state);
      fill.style.background = "transparent";
      const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
      const util = dateCell.util == null ? u0 : (Number(dateCell.util.value) || u0);
      fill.textContent = Math.abs(util - u0) > 1e-5 ? String(util) : "";
      fill.style.color = "#111";
      return;
    }
    td.style.background = holidayBgColor(holType) || "";
    fill.style.background = "";
    fill.textContent = "";
    fill.style.color = "";
  }

  function applyPlanCellsDomDiff(plan, prevCells, nextCells, dates, cache) {
    const touched = new Set();
    dates.forEach((ds) => {
      const prevKey = cellVisualKeyFromCell(plan, prevCells ? prevCells[ds] : null);
      const nextKey = cellVisualKeyFromCell(plan, nextCells ? nextCells[ds] : null);
      if (prevKey === nextKey) return;
      touched.add(ds);
      updatePlanCellDomByData(plan, ds, nextCells ? nextCells[ds] : null, cache);
    });
    return touched;
  }

  function refreshManhoursRowsDom() {
    const computeTotalHoursBy = (dateStr, filterFn) => {
      let totalHours = 0;
      state.data.domains.forEach((dom) => {
        (dom.projects || []).forEach((pr) => {
          (pr.versions || []).forEach((vr) => {
            (vr.tasks || []).forEach((tk) => {
              (tk.plans || []).forEach((pl) => {
                if (!planMatchesCaseFilter(pl) || !filterFn(pl, dom)) return;
                totalHours += dayHoursAll(pl, dateStr);
              });
            });
          });
        });
      });
      return totalHours;
    };
    const rows = ganttVScroll.querySelectorAll("tr.manhoursRow[data-mh-kind]");
    rows.forEach((row) => {
      const kind = row.dataset.mhKind || "";
      const caseId = row.dataset.caseId || "";
      const domainId = row.dataset.domainId || "";
      row.querySelectorAll("td.daycell[data-date]").forEach((td) => {
        const ds = td.dataset.date || "";
        if (!ds) return;
        let totalHours = 0;
        if (kind === "case") {
          totalHours = computeTotalHoursBy(ds, (pl) => pl.caseId === caseId);
        } else if (kind === "domain") {
          totalHours = computeTotalHoursBy(ds, (pl, dom) => pl.caseId === caseId && dom.id === domainId);
        } else {
          totalHours = computeTotalHoursBy(ds, () => true);
        }
        td.textContent = (totalHours / 8).toFixed(1);
        td.title = totalHours + "hr";
      });
    });
  }

  function getDateRange(state) {
    let minD = null, maxD = null;
    const bump = (s) => {
      if (!s) return;
      if (!minD || daysBetween(s, minD) > 0) minD = s;
      if (!maxD || daysBetween(maxD, s) > 0) maxD = s;
    };
    eachPlan(state, (pl) => {
      Object.keys(pl.cells || {}).forEach((ds) => {
        if (!cellIsOn(pl, ds)) return;
        bump(ds);
      });
    });
    if (!minD || !maxD) {
      const today = toDateString(new Date());
      minD = addDays(today, -14);
      maxD = addDays(today, 14);
    } else {
      minD = addDays(minD, -14);
      maxD = addDays(maxD, 14);
    }
    const out = [];
    let cur = parseYMD(minD);
    const end = parseYMD(maxD);
    while (cur <= end) {
      out.push(toDateString(cur));
      cur.setDate(cur.getDate() + 1);
    }
    return out;
  }

  function shouldRefreshGanttNearRangeEdge(plan, dates, cellsOverride) {
    if (!plan || !Array.isArray(dates) || dates.length === 0) return false;
    const minDate = dates[0];
    const maxDate = dates[dates.length - 1];
    const cells = cellsOverride || plan.cells || {};
    const keys = Object.keys(cells);
    for (let i = 0; i < keys.length; i++) {
      const ds = keys[i];
      const c = cells[ds];
      if (!c || typeof c !== "object" || c.util == null) continue;
      const dMin = Math.abs(daysBetween(ds, minDate));
      const dMax = Math.abs(daysBetween(ds, maxDate));
      if (dMin <= 7 || dMin > 14 || dMax <= 7 || dMax > 14) return true;
    }
    return false;
  }

  function startEditLabel(span, onCommit) {
    const t = span.textContent;
    const inp = document.createElement("textarea");
    inp.className = "editLabelInput";
    //inp.type = "text";
    inp.value = t;
    span.replaceWith(inp);
    inp.focus();
    inp.select();
    function done() {
      onCommit(inp.value);
      renderAll();
    }
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); inp.blur(); }
    });
    inp.addEventListener("blur", done);
  }

      ns.addEventListener("click", () => startEditLabel(ns, (v) => { pl.name = v || pl.name; markDirty(state, true); }));
      title.appendChild(ns);
      // tool
      const tool = document.createElement("div");
      tool.className = "inputPaneHeaderTool";
      tool.appendChild(addDeleteBtn(() => {
        if (!confirm(`"${pl.name}" を削除してもよろしいですか？`)) return;
        // データから削除, ガントチャート更新
        tk.plans = tk.plans.filter((p) => p !== pl);

        renderGantt();
        // DOMから削除, 入力ペイン更新

        calcTreeSticky();

      // element構築
      ph.appendChild(title);
      ph.appendChild(tool);
      box.appendChild(ph);

      const fields = document.createElement("div");
      fields.className = "planFields";

      box.addEventListener("focusin", selectPlanInLeftPane);

      // 開始日と終了日をまとめたテーブル
      {

            syncPhaseTotalsFromField(state, pl, ph, "planned", inpP.value);

            markDirty(state, true);
            renderAll();
          });
        }
        tdP.appendChild(inpP);
        plannedRow.appendChild(tdP);
        // 実績工数行に入力欄を追加
        const tdA = document.createElement("td");
        const inpA = document.createElement("input");

      const rowSelect = addMiniRow();
      const inpUtil = document.createElement("input");
      inpUtil.type = "number";
      inpUtil.step = "0.1";
      inpUtil.min = "0.1";
      inpUtil.style.maxWidth = "4.5em";
      inpUtil.value = pl.utilization;
      inpUtil.addEventListener("change", () => {
        const nextUtil = Number(inpUtil.value) || 1;
        pl.utilization = nextUtil;
        Object.keys(pl.cells || {}).forEach((ds) => {
          const cell = pl.cells[ds];
          if (!cell || typeof cell !== "object") return;
          const utilObj = cell.util;
          if (!utilObj || typeof utilObj !== "object") return;
          if (!Object.prototype.hasOwnProperty.call(utilObj, "value")) return;
          const explicit = Number(utilObj.value);
          if (!Number.isFinite(explicit)) return;
          if (Math.abs(explicit - nextUtil) <= 1e-5) {
            delete utilObj.value;
          }
        });
        Object.keys(pl.cells || {}).forEach((ds) => {
          updatePlanCellDomByData(pl, ds, pl.cells[ds], null);
        });

      // case選択
      const selCase = document.createElement("select");
      d.cases.forEach((c) => {
        const o = document.createElement("option");
        o.value = c.id;
        o.textContent = c.name;
        selCase.appendChild(o);
      });
      selCase.value = pl.caseId || "";
      selCase.addEventListener("change", () => {
        const next = selCase.value || null;
        const prev = pl.caseId;
        pl.caseId = next;
        if (!validateCaseOwner(tk, pl)) {
          alert("同一 task 内で case+owner の組み合わせはユニークである必要があります。");
          pl.caseId = prev;
          selCase.value = prev || "";
        } else {
          markDirty(state, true);
          renderAll();
        }
      });
      addLabeled(rowSelect, "case", selCase);
      // owner選択
      const selOwn = document.createElement("select");
      d.members.forEach((m) => {
        const o = document.createElement("option");
        o.value = m.id;
        o.textContent = m.name;
        selOwn.appendChild(o);
      });
      selOwn.value = pl.ownerId || "";
      selOwn.addEventListener("change", () => {
        const next = selOwn.value || null;
        const prev = pl.ownerId;
        pl.ownerId = next;
        if (!validateCaseOwner(tk, pl)) {
          alert("同一 task 内で case+owner の組み合わせはユニークである必要があります。");
          pl.ownerId = prev;
          selOwn.value = prev || "";
        } else {
          markDirty(state, true);
          renderAll();
        }
      });
      addLabeled(rowSelect, "owner", selOwn);
      const colPick = document.createElement("input");
      colPick.type = "color";
      colPick.style.maxWidth = "3em";
      colPick.value = (planBarColor(pl, state) || "#6b9bd2").replace(/[^#0-9a-fA-F]/g, "").slice(0, 7);
      colPick.addEventListener("input", () => {
        applyColorToCaseOwner(tk, pl, colPick.value);
        markDirty(state, true);
        renderAll();
      });
      addLabeled(rowSelect, "色", colPick);
      const selSt = document.createElement("select");
      d.statuses.forEach((s) => {
        const o = document.createElement("option");
        o.value = s.id;
        o.textContent = s.name || s.id;
        selSt.appendChild(o);
      });
      selSt.value = pl.statusId || "";
      selSt.addEventListener("change", () => {
        pl.statusId = selSt.value || null;
        markDirty(state, true);
        renderAll();
      });
      addLabeled(rowSelect, "status", selSt);

      box.appendChild(fields);
      return box;
    }


    // header要素 / domain追加ボタン
    const head = document.createElement("div");
    head.className = "inputPaneHeader inputPaneToolHeader";
    // title
    const title = document.createElement("div");
    title.className = "inputPaneHeaderTitle";
    const head_caption = document.createElement("span");
    // head_caption.className = "nameCell";
    head_caption.textContent = "情報入力パネル";
    title.appendChild(head_caption);
    // tool
    const tool = document.createElement("div");
    tool.className = "inputPaneHeaderTool";
    tool.appendChild(addBtn("+ domain", () => {
      const nd = { id: uid(), name: "新しい domain", cells: {}, projects: [] };
      d.domains.push(nd);
      markDirty(state, true);
      renderGantt();
      // dom要素作成
      const domEl = makeDomainNode(nd);
      leftPane.appendChild(domEl);
      calcTreeSticky();
    }));
    // element構築
    head.appendChild(title);
    head.appendChild(tool);
    leftPane.appendChild(head);

    // domain / project / version / taskのツリー構造
    d.domains.forEach((dom) => {
      // domain要素
      const domEl = makeDomainNode(dom);

      (dom.projects || []).forEach((pr) => {
        // project要素
        const pe = makeProjectNode(dom, pr);

        (pr.versions || []).forEach((vr) => {
          // version要素
          const ve = makeVersionNode(pr, vr);

          (vr.tasks || []).forEach((tk) => {
            // task要素
            const te = makeTaskNode(vr, tk);

            (tk.plans || []).forEach((pl) => {
              // plan要素
              const box = makePlanNode(tk, pl);
              te.appendChild(box);
            });
            ve.appendChild(te);
          });
          pe.appendChild(ve);
        });
        domEl.appendChild(pe);
      });
      leftPane.appendChild(domEl);
    });
    // 描画後にsticky headerの位置を調整
    calcTreeSticky();
  }

  function calcTreeSticky() {
    // header要素の高さを取得
    const head = leftPane.querySelector(".inputPaneToolHeader");
    const inpPaneHeaderH = head.getBoundingClientRect().height;
    // domain要素
    const domains = leftPane.querySelectorAll(".inputPaneDomain");
    domains.forEach((dom) => {
      const domHeader = dom.querySelector(".inputPaneDomainHeader");
      domHeader.style.top = inpPaneHeaderH + "px";
      const offsetProject = inpPaneHeaderH + domHeader.getBoundingClientRect().height;

      // project要素
      const projects = dom.querySelectorAll(".inputPaneProject");
      projects.forEach((pr) => {
        const prHeader = pr.querySelector(".inputPaneProjectHeader");
        const offsetVersion = offsetProject + prHeader.getBoundingClientRect().height;
        prHeader.style.top = offsetProject + "px";

        // version要素
        const versions = pr.querySelectorAll(".inputPaneVersion");
        versions.forEach((vr) => {
          const vrHeader = vr.querySelector(".inputPaneVersionHeader");
          const offsetTask = offsetVersion + vrHeader.getBoundingClientRect().height;
          vrHeader.style.top = offsetVersion + "px";

          // task要素
          const tasks = vr.querySelectorAll(".inputPaneTask");
          tasks.forEach((tk) => {
            const tkHeader = tk.querySelector(".inputPaneTaskHeader");
            tkHeader.style.top = offsetTask + "px";
          });
        });
      });
    });
  }

  function validateCaseOwner(task, plan) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    return !(task.plans || []).some((p) => p.id !== plan.id && (p.caseId || "") + "|" + (p.ownerId || "") === key);
  }

  function applyColorToCaseOwner(task, plan, color) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    (task.plans || []).forEach((p) => {
      if ((p.caseId || "") + "|" + (p.ownerId || "") === key) p.color = color;
    });
  }

  function planMatchesCaseFilter(pl) {
    if (!state.caseFilter || state.caseFilter.length === 0) return true;
    return state.caseFilter.includes(pl.caseId || "");
  }

  function contiguousBlock(plan, dateStr, state, datesOverride) {
    const dates = datesOverride || getDateRange(state);
    const idx = dates.indexOf(dateStr);
    if (idx < 0) return { start: dateStr, end: dateStr };
    let s = idx, e = idx;
    let li = s - 1;
    while (li >= 0) {
      if (hasDisplayedHours(plan, dates[li])) {
        s = li;
        li--;
        continue;
      }
      if (isHolidayDate(dates[li], plan, state)) {
        li--;
        continue;
      }
      break;
    }
    let ri = e + 1;
    while (ri < dates.length) {
      if (hasDisplayedHours(plan, dates[ri])) {
        e = ri;
        ri++;
        continue;
      }
      if (isHolidayDate(dates[ri], plan, state)) {
        ri++;
        continue;
      }
      break;
    }
    return { start: dates[s], end: dates[e], startIdx: s, endIdx: e };
  }

  function planCellInteractionMode(pl, dateStr, localX, cellWidth, datesOverride) {
    const blk = contiguousBlock(pl, dateStr, state, datesOverride);
    if (!hasDisplayedHours(pl, dateStr)) return "click";
    if (dateStr === blk.start && localX < PLAN_CELL_EDGE_PX) return "resize-left";
    if (dateStr === blk.end && localX > cellWidth - PLAN_CELL_EDGE_PX) return "resize-right";
    return "move";
  }

  function cursorForPlanCellMode(mode) {
    if (mode === "resize-left" || mode === "resize-right") return "ew-resize";
    if (mode === "move") return "move";
    return "";
  }

  function clearInputCell(cells, ds) {
    const c = cells[ds];
    if (!c || typeof c !== "object" || c === true) {
      delete cells[ds];
      return;
    }
    delete c.util;
    if (!c.comment || !String(c.comment.text || "").trim()) {
      delete cells[ds];
      return;
    }
    cells[ds] = c;
  }

  function shiftIndexByBusinessDays(dates, startIdx, step, plan, state) {
    if (step === 0) return startIdx;
    let idx = startIdx;
    let remain = Math.abs(step);
    const dir = step > 0 ? 1 : -1;
    while (remain > 0) {
      idx += dir;
      if (idx < 0 || idx >= dates.length) return -1;
      if (!isHolidayDate(dates[idx], plan, state)) remain--;
    }
    return idx;
  }

  const WD_JP = ["日", "月", "火", "水", "木", "金", "土"];

  function weekdayJp(ymd) {
    const d = parseYMD(ymd);
    return d ? WD_JP[d.getDay()] : "";
  }

  function computeTreeHead2WidthPx() {
    const labels = ["—"];
    state.data.domains.forEach((dom) => {
      //labels.push(dom.name || "");
      (dom.projects || []).forEach((pr) => {
        //labels.push(pr.name || "");
        (pr.versions || []).forEach((vr) => {
          //labels.push(vr.name || "");
          (vr.tasks || []).forEach((tk) => {
            (tk.plans || []).forEach((pl) => labels.push(pl.name || ""));
          });
        });
      });
    });
    const minsize = 100;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    if (!ctx) return minsize;
    ctx.font = "11px " + getComputedStyle(document.documentElement).getPropertyValue("--font").trim();
    let maxW = 0;
    labels.forEach((txt) => {
      const w = ctx.measureText(String(txt)).width;
      if (w > maxW) maxW = w;
    });
    return Math.max(minsize, Math.ceil(maxW) + 15);
  }

  function renderGantt(datesOverride) {
    const dates = datesOverride || getDateRange(state);
    const commentRefs = [];
    const tbl = document.createElement("table");
    tbl.className = "gantt";
    const treeHead2W = computeTreeHead2WidthPx();
    tbl.style.setProperty("--tree-head2-w", treeHead2W + "px");
    const colgroup = document.createElement("colgroup");
    colgroup.innerHTML = '<col class="treeHead" style="width:var(--tree-head1-w)" /><col class="treeHead2" style="width:' + treeHead2W + 'px" />' +
      dates.map(() => '<col style="width:28px" />').join("");
    tbl.appendChild(colgroup);
    const thead = document.createElement("thead");
    const tbody = document.createElement("tbody");
    tbl.appendChild(thead);
    tbl.appendChild(tbody);

    function addDayHeaderRow(rowClass, textFn, bgFn) {
      const tr = document.createElement("tr");
      tr.className = rowClass;
      const th1 = document.createElement("th");
      th1.className = "treeHead";
      th1.colSpan = 2;
      tr.appendChild(th1);
      dates.forEach((ds) => {
        const th = document.createElement("th");
        th.className = "dayHead";
        th.textContent = textFn(ds);
        if (bgFn) th.style.background = bgFn(ds) || "";
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    function addGroupedHeaderRow(rowClass, textFn, bgFn) {
      const tr = document.createElement("tr");
      tr.className = rowClass;
      const th1 = document.createElement("th");
      th1.className = "treeHead";
      th1.colSpan = 2;
      tr.appendChild(th1);
      if (dates.length === 0) {
        thead.appendChild(tr);
        return;
      }
      let start = 0;
      while (start < dates.length) {
        const label = textFn(dates[start]);
        let end = start + 1;
        while (end < dates.length && textFn(dates[end]) === label) end++;
        const th = document.createElement("th");
        th.className = "dayHead";
        th.colSpan = end - start;
        if (rowClass === "calYear" || rowClass === "calMonth") {
          const txt = document.createElement("span");
          txt.className = "calStickyLabel";
          txt.textContent = label;
          th.appendChild(txt);
        } else {
          th.textContent = label;
        }
        if (bgFn) th.style.background = bgFn(dates[start]) || "";
        tr.appendChild(th);
        start = end;
      }
      thead.appendChild(tr);
    }

    addGroupedHeaderRow("calYear", (ds) => ds.slice(0, 4));
    addGroupedHeaderRow("calMonth", (ds) => ds.slice(5, 7));
    addDayHeaderRow("calDay", (ds) => ds.slice(8, 10), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state)));
    addDayHeaderRow("calWeek", (ds) => weekdayJp(ds), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state)));

    // 人工数集計行を追加
    function createManhoursRow(label, filterFn, depth = 0) {
      const tr = document.createElement("tr");
      tr.className = "treeRow manhoursRow";
      const labelCell = document.createElement("td");
      labelCell.className = "treeHead";
      labelCell.colSpan = 2;
      labelCell.style.paddingLeft = (8 + depth * 10) + "px";
      labelCell.textContent = label;
      tr.appendChild(labelCell);
      
      dates.forEach((ds) => {
        const td = document.createElement("td");
        td.className = "daycell";
        td.dataset.date = ds;
        
        // 当日の総工数を計算
        let totalHours = 0;
        state.data.domains.forEach((dom) => {
          (dom.projects || []).forEach((pr) => {
            (pr.versions || []).forEach((vr) => {
              (vr.tasks || []).forEach((tk) => {
                (tk.plans || []).forEach((pl) => {
                  if (planMatchesCaseFilter(pl) && filterFn(pl, dom)) {
                    const hours = dayHoursAll(pl, ds);
                    totalHours += hours;
                  }
                });
              });
            });
          });
        });
        
        // 人工 = 工数 / 8hr
        const manHours = (totalHours / 8).toFixed(1);
        td.textContent = manHours;
        td.title = totalHours + "hr";
        tr.appendChild(td);
      });
      
      return tr;
    }

    // 総合人工行（クリック可能、集計行の表示非表示を切り替え）
    const totalManhoursRow = document.createElement("tr");
    totalManhoursRow.className = "treeRow manhoursRow manhoursHeader";
    //totalManhoursRow.dataset.mhKind = "total";
    const totalLabelCell = document.createElement("td");
    totalLabelCell.className = "treeHead";
    totalLabelCell.colSpan = 2;
    // totalLabelCell.style.userSelect = "none";
    totalLabelCell.textContent = "総合人工 (" + (state.manhoursExpanded ? "▼" : "▶") + ")";
    totalManhoursRow.appendChild(totalLabelCell);
    
    //dates.forEach((ds) => {
      dates.forEach((ds) => {
        const td = document.createElement("td");
        td.className = "daycell";
        td.dataset.date = ds;
        //td.colSpan = dates.length;
        td.textContent = "";
        totalManhoursRow.appendChild(td);
      });
    //});
    
    totalManhoursRow.addEventListener("click", () => {
      state.manhoursExpanded = !state.manhoursExpanded;
      renderGantt();
    });
    
    thead.appendChild(totalManhoursRow);

    // Case別の集計行
    state.data.cases.forEach((cse) => {
      // Case別総合行
      const caseRow = createManhoursRow("Case: " + cse.name, (pl) => pl.caseId === cse.id, 0);
      caseRow.className += " manhoursCaseDetailRow";
      caseRow.dataset.mhKind = "case";
      caseRow.dataset.caseId = cse.id;
      if (!state.manhoursExpanded) caseRow.style.display = "none";
      thead.appendChild(caseRow);
      
      // Domain別の集計行
      state.data.domains.forEach((dom) => {
        const domRow = createManhoursRow("  └ " + dom.name, (pl, d) => pl.caseId === cse.id && d.id === dom.id, 1);
        domRow.className += " manhoursDomainDetailRow";
        domRow.dataset.mhKind = "domain";
        domRow.dataset.caseId = cse.id;
        domRow.dataset.domainId = dom.id;
        if (!state.manhoursExpanded) domRow.style.display = "none";
        thead.appendChild(domRow);
        
        // Member別の集計行
        state.data.members.forEach((mem) => {
          const memRow = createManhoursRow("    └ " + mem.name, (pl, d) => pl.caseId === cse.id && d.id === dom.id && pl.ownerId === mem.id, 2);
          memRow.className += " manhoursMemberDetailRow";
          memRow.dataset.mhKind = "member";
          memRow.dataset.caseId = cse.id;
          memRow.dataset.domainId = dom.id;
          memRow.dataset.memberId = mem.id;
          if (!state.manhoursExpanded) memRow.style.display = "none";
          thead.appendChild(memRow);
        });
      });
    });

    function addDPVRow(label, target, kind) {
      const tr = document.createElement("tr");
      tr.className = "treeRow dpvRow dpv-" + kind;
      const tdLabel = document.createElement("td");
      tdLabel.colSpan = 2;
      tdLabel.className = "treeHead";
      tdLabel.textContent = label;
      tr.appendChild(tdLabel);
      dates.forEach(() => {
        const c = document.createElement("td");
        c.className = "daycell";
        tr.appendChild(c);
      });
      const startIdx = 1;
      dates.forEach((ds, i) => {
        const key = commentRefKey(kind, target, ds);
        const c = tr.children[startIdx + i];
        c.style.position = "relative";
        if (getCellComment(target, ds).trim()) {
          const dot = document.createElement("span");
          dot.style.position = "absolute";
          dot.style.top = "2px";
          dot.style.right = "2px";
          dot.style.width = "5px";
          dot.style.height = "5px";
          dot.style.borderRadius = "50%";
          dot.style.background = "#b0293a";
          dot.dataset.commentRef = key;
          c.appendChild(dot);
          commentRefs.push({ key, kind, label, target, date: ds, dot });
        }
        c.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCommentPopup(target, ds, kind + ":" + label, c, key);
        });
      });
      tbody.appendChild(tr);
    }

    function appendPlanDayCells(tr, dom, pr, vr, pl) {
      dates.forEach((ds) => {
        const key = commentRefKey("plan", pl, ds);
        const td = document.createElement("td");
        td.className = "daycell";
        td.style.position = "relative";
        const hrs = dayHoursAll(pl, ds);
        const cap = hrs > 0 ? hrs : 8 * (pl.utilization || 1);
        const base = planBarColor(pl, state);
        const holType = holidayTypeForDate(ds, pl, state);
        const fill = document.createElement("span");
        fill.className = "fill";
        if (hrs > 0) {
          td.style.background = base;
          fill.style.background = "transparent";
        } else {
          td.style.background = holidayBgColor(holType) || "";
          fill.style.background = "";
        }
        const uShow = cellIsOn(pl, ds) && Math.abs(effectiveCellUtil(pl, ds) - (pl.utilization || 1)) > 1e-5;
        fill.textContent = uShow ? String(effectiveCellUtil(pl, ds)) : "";
        fill.style.color = hrs > 0 ? "#111" : "";
        // fill.style.fontSize = "9px";
        fill.style.lineHeight = "20px";

        const actH = actualHoursOnDate(pl, ds, state);
        const actBar = document.createElement("div");
        actBar.className = "actual";
        actBar.style.opacity = actH > 0 ? "1" : "0";

        td.appendChild(fill);
        td.appendChild(actBar);
        if (getCellComment(pl, ds).trim()) {
          const dot = document.createElement("span");
          dot.style.position = "absolute";
          dot.style.top = "2px";
          dot.style.right = "2px";
          dot.style.width = "5px";
          dot.style.height = "5px";
          dot.style.borderRadius = "50%";
          dot.style.background = "#b0293a";
          dot.dataset.commentRef = key;
          td.appendChild(dot);
          commentRefs.push({ key, kind: "plan", label: pl.name, target: pl, date: ds, dot });
        }

        td.dataset.date = ds;
        td.dataset.planId = pl.id;

        td.addEventListener("mousemove", (e) => {
          const r = td.getBoundingClientRect();
          const localX = e.clientX - r.left;
          const m = planCellInteractionMode(pl, ds, localX, r.width, dates);
          td.style.cursor = cursorForPlanCellMode(m) || "cell";
        });
        td.addEventListener("mouseleave", () => {
          td.style.cursor = "";
        });

        td.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCommentPopup(pl, ds, "plan:" + pl.name, td, key);
        });
        td.addEventListener("pointerdown", (e) => onCellPointerDown(e, pl, ds, dates));
        tr.appendChild(td);
      });
    }

    function appendTaskPlanRows(dom, pr, vr, tk) {
      const vis = (tk.plans || []).filter(planMatchesCaseFilter);
      const n = Math.max(1, vis.length);
      if (vis.length === 0) {
        const tr = document.createElement("tr");
        tr.className = "treeRow";
        const t2 = document.createElement("td");
        t2.className = "treeHead nameCell";
        t2.textContent = tk.name;
        const t3 = document.createElement("td");
        t3.className = "treeHead2 muted";
        t3.textContent = "—";
        tr.appendChild(t2);
        tr.appendChild(t3);
        dates.forEach(() => {
          const c = document.createElement("td");
          c.className = "daycell";
          c.style.background = "#eee";
          tr.appendChild(c);
        });
        tbody.appendChild(tr);
        return;
      }
      vis.forEach((pl, i) => {
        const tr = document.createElement("tr");
        tr.className = "planRow" + (state.selectedPlanId === pl.id ? " selected" : "");
        tr.dataset.planId = pl.id;
        if (i === 0) {
          const t2 = document.createElement("td");
          t2.className = "treeHead nameCell";
          t2.rowSpan = n;
          // t2.textContent = tk.name;
          t2.innerHTML = tk.name;
          tr.appendChild(t2);
        }
        const tPlan = document.createElement("td");
        tPlan.className = "treeHead2 nameCell";
        tPlan.textContent = pl.name;
        tPlan.addEventListener("click", () => {
          state.selectedPlanId = pl.id;
          applySelectedPlanDom(state.selectedPlanId);
          scrollLeftPlanIntoView(state.selectedPlanId);
        });
        tr.appendChild(tPlan);
        appendPlanDayCells(tr, dom, pr, vr, pl);
        tbody.appendChild(tr);
      });
    }

    state.data.domains.forEach((dom) => {
      addDPVRow(dom.name, dom, "domain");
      (dom.projects || []).forEach((pr) => {
        addDPVRow(pr.name, pr, "project");
        (pr.versions || []).forEach((vr) => {
          addDPVRow(vr.name, vr, "version");
          (vr.tasks || []).forEach((tk) => {
            appendTaskPlanRows(dom, pr, vr, tk);
          });
        });
      });
    });

    const stage = document.createElement("div");
    stage.className = "ganttStage";
    stage.appendChild(tbl);
    const lineLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    lineLayer.setAttribute("class", "commentLineLayer");
    const commentLayer = document.createElement("div");
    commentLayer.className = "commentLayer";
    stage.appendChild(lineLayer);
    stage.appendChild(commentLayer);

    function clampCommentPos(x, y, cardW, cardH) {
      const maxX = Math.max(0, stage.offsetWidth - cardW - 4);
      const maxY = Math.max(0, stage.offsetHeight - cardH - 4);
      return { x: Math.min(Math.max(0, x), maxX), y: Math.min(Math.max(0, y), maxY) };
    }

    function drawCommentOverlay() {
      const showAll = state.commentDisplayMode === "always";
      const refs = showAll
        ? commentRefs
        : commentRefs.filter((r) => r.key === state.commentContextKey);
      commentLayer.innerHTML = "";
      while (lineLayer.firstChild) lineLayer.removeChild(lineLayer.firstChild);
      const rect = stage.getBoundingClientRect();
      lineLayer.setAttribute("width", String(stage.offsetWidth));
      lineLayer.setAttribute("height", String(stage.offsetHeight));
      lineLayer.style.width = stage.offsetWidth + "px";
      lineLayer.style.height = stage.offsetHeight + "px";
      commentLayer.style.width = stage.offsetWidth + "px";
      commentLayer.style.height = stage.offsetHeight + "px";
      refs.forEach((ref) => {
        const text = getCellComment(ref.target, ref.date);
        if (!text.trim()) return;
        const dotR = ref.dot.getBoundingClientRect();
        const dotX = dotR.left - rect.left + dotR.width / 2;
        const dotY = dotR.top - rect.top + dotR.height / 2;
        const card = document.createElement("div");
        card.className = "commentCard";
        card.textContent = text;
        commentLayer.appendChild(card);
        const saved = getCellCommentPos(ref.target, ref.date);
        const cw = card.offsetWidth;
        const ch = card.offsetHeight;
        const baseX = saved ? saved.x : dotX + 12;
        const baseY = saved ? saved.y : dotY - 10;
        const pos = clampCommentPos(baseX, baseY, cw, ch);
        card.style.left = pos.x + "px";
        card.style.top = pos.y + "px";

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("stroke", "#b0293a");
        line.setAttribute("stroke-width", "1.2");
        line.setAttribute("stroke-opacity", "0.9");
        lineLayer.appendChild(line);
        const updateLine = () => {
          const cx = parseFloat(card.style.left) || 0;
          const cy = parseFloat(card.style.top) || 0;
          line.setAttribute("x1", String(dotX));
          line.setAttribute("y1", String(dotY));
          line.setAttribute("x2", String(cx));
          line.setAttribute("y2", String(cy + 10));
        };
        updateLine();

        card.addEventListener("pointerdown", (ev) => {
          if (ev.button !== 0) return;
          ev.preventDefault();
          ev.stopPropagation();
          const sx = ev.clientX;
          const sy = ev.clientY;
          const ox = parseFloat(card.style.left) || 0;
          const oy = parseFloat(card.style.top) || 0;
          card.setPointerCapture(ev.pointerId);
          const onMv = (mv) => {
            const nx = ox + (mv.clientX - sx);
            const ny = oy + (mv.clientY - sy);
            const cl = clampCommentPos(nx, ny, cw, ch);
            card.style.left = cl.x + "px";
            card.style.top = cl.y + "px";
            updateLine();
          };
          const onUp = (up) => {
            card.releasePointerCapture(up.pointerId);
            card.removeEventListener("pointermove", onMv);
            card.removeEventListener("pointerup", onUp);
            const px = parseFloat(card.style.left) || 0;
            const py = parseFloat(card.style.top) || 0;
            setCellCommentPos(ref.target, ref.date, { x: px, y: py });
            markDirty(state, true);
            renderGantt(dates);
          };
          card.addEventListener("pointermove", onMv);
          card.addEventListener("pointerup", onUp);
        });
      });
    }

    ganttVScroll.innerHTML = "";
    ganttVScroll.appendChild(stage);
    drawCommentOverlay();
  }

  function actualHoursOnDate(pl, ds, state) {
    const tot = Number((pl.phaseHours.all && pl.phaseHours.all.actual) || 0);
    if (tot <= 0) return 0;
    if (!pl.actualStart || !pl.actualEnd) return 0;
    if (daysBetween(pl.actualStart, ds) >= 0 && daysBetween(ds, pl.actualEnd) >= 0) {
      const span = Math.max(1, daysBetween(pl.actualStart, pl.actualEnd) + 1);
      return tot / span;
    }
    return 0;
  }

  function inputCellUtil(plan, ds) {
    const cell = plan.cells[ds] || (plan.cells[ds] = {});
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    const curU = effectiveCellUtil(plan, ds);

    // クリックされたセル要素を検索
    const td = ganttVScroll.querySelector('td.daycell[data-plan-id="' + plan.id + '"][data-date="' + ds + '"]');
    const spn = td.querySelector('span');
    const curText = spn.textContent;
    spn.textContent = String(curU);
    spn.contentEditable = "true";
    spn.focus();
    // テキストを全選択
    document.execCommand("selectAll", false, null);
    const onChange = () => {
      const new_txt = spn.textContent.trim();
      // 入力値を数値として解析
      let val = Number(new_txt);
      if (isNaN(val)) {
        alert("有効な数値を入力してください（0で削除）");
        spn.textContent = String(curU);
        spn.focus();
        return;
      }
      //
      spn.removeEventListener("blur", onChange);
      spn.removeEventListener("keydown", onKey);
      // 空白で0扱い
      if (new_txt === "") {
        val = 0;
      }
      //
      if (val < 1e-5) {
        delete cell.util;
      } else {
        if (val != plan.utilization) {
          cell.util.value = val;
        } else {
          delete cell.util.value;
        }
      }
      spn.contentEditable = "false";
      updatePlanCellDomByData(plan, ds, plan.cells[ds] || cell, null);
      recomputeAllPhaseFromCells(plan);
      plan.plannedEnd = computePlannedEnd(plan, state);
      markDirty(state, true);
      syncLeftPanePlanSummaryDom(plan.id);
      refreshManhoursRowsDom();
    };
    spn.addEventListener("blur", onChange);
    // Enterキーで確定、Escキーでキャンセル
    const onKey = (e) => {
      if (e.key === "Enter") {
        onChange();
      } else if (e.key === "Escape") {
        spn.textContent = curText;
        spn.contentEditable = "false";
      }
    }
    spn.addEventListener("keydown", onKey);

    markDirty(state, true);
  }

  function cycleCellUtil(plan, ds) {
    const cell = plan.cells[ds] || (plan.cells[ds] = {});
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    const seq = [0.5, 1, 1.5, 2, u0];
    const curU = effectiveCellUtil(plan, ds);
    const idx = seq.findIndex((u) => Math.abs(u - curU) < 1e-5);
    const next = seq[(Math.max(0, idx) + 1) % seq.length];
    if (Math.abs(next - u0) < 1e-5) {
      if (typeof cell === "object") delete cell.util;
    } else if (typeof cell === "object") cell.util = next;
    markDirty(state, true);
  }

  function onCellPointerDown(e, pl, ds, dates) {
    if (e.button !== 0) return;
    const td = e.currentTarget;
    const rect = td.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const blk = contiguousBlock(pl, ds, state, dates);
    const mode = planCellInteractionMode(pl, ds, x, rect.width, dates);
    state.drag = {
      mode,
      planId: pl.id,
      startDate: ds,
      block: blk,
      startX: e.clientX,
      orig: cloneCells(pl.cells),
      draftCells: cloneCells(pl.cells),
      frozenDates: dates.slice(),
      lastStep: 0,
      changed: false,
      dragMoved: false,
      touchedDates: new Set(),
      cellDomCache: buildPlanCellDomCache(pl.id, dates),
    };
    td.setPointerCapture(e.pointerId);
    const pln = findPlan(state, pl.id);
    const onMove = (ev) => {
      const dg0 = state.drag;
      if (!dg0) return;
      if (dg0.mode === "click") {
        if (Math.abs(ev.clientX - dg0.startX) > 4) dg0.dragMoved = true;
        return;
      }
      dg0.dragMoved = true;
      onCellPointerMove(ev, pln);
    };
    const onUp = (ev) => {
      td.releasePointerCapture(ev.pointerId);
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      const dg = state.drag;
      if (dg && pln) {
        if (dg.mode === "click" && !dg.dragMoved && pln) {
          if (!cellIsOn(pln, ds)) {
            const util0 = pln.utilization == null ? 1 : Number(pln.utilization);
            let cell = pln.cells[ds];
            if (!cell || typeof cell !== "object" || cell === true) cell = {};
            if (!cell.util) cell.util = {};
            pln.cells[ds] = cell;
            updatePlanCellDomByData(pln, ds, pln.cells[ds], dg.cellDomCache);

            const minCellDate = earliestInputCellDate(pln);
            if (minCellDate) pln.plannedStart = minCellDate;
            recomputeAllPhaseFromCells(pln);
            pln.plannedEnd = computePlannedEnd(pln, state);
            markDirty(state, true);
            syncLeftPanePlanSummaryDom(pln.id);
            refreshManhoursRowsDom();
            if (shouldRefreshGanttNearRangeEdge(pln, dg.frozenDates || dates || [], pln.cells)) renderGantt();
          }
        } else if (dg.mode === "move" && !dg.dragMoved && cellIsOn(pln, ds)) {
          // セル移動なし:クリックのみ:稼働率処理
          inputCellUtil(pln, ds);
          recomputeAllPhaseFromCells(pln);
          pln.plannedEnd = computePlannedEnd(pln, state);
        } else if (dg.changed) {
          pln.cells = dg.draftCells;
          applyPlanCellsDomDiff(pln, dg.orig, pln.cells, dg.frozenDates || [], dg.cellDomCache);
          const minCellDate = earliestInputCellDate(pln);
          if (minCellDate) pln.plannedStart = minCellDate;
          recomputeAllPhaseFromCells(pln);
          pln.plannedEnd = computePlannedEnd(pln, state);
          markDirty(state, true);
          syncLeftPanePlanSummaryDom(pln.id);
          refreshManhoursRowsDom();
          if (shouldRefreshGanttNearRangeEdge(pln, dg.frozenDates || dates || [], pln.cells)) renderGantt();
        }
      }
      state.drag = null;
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }

  function onCellPointerMove(e, pl) {
    const dg = state.drag;
    if (!dg || !pl || dg.planId !== pl.id) return;
    const dates = dg.frozenDates && dg.frozenDates.length ? dg.frozenDates : getDateRange(state);
    const dayW = 28;
    const dx = e.clientX - dg.startX;
    const step = Math.round(dx / dayW);
    if (step === dg.lastStep) return;

    const { startIdx, endIdx } = dg.block || {};
    if (startIdx == null || endIdx == null) return;

    const prevDraft = dg.draftCells || cloneCells(dg.orig || {});
    const nextCells = cloneCells(dg.orig || {});
    let changed = false;

    if (dg.mode === "move") {
      const targets = [];
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (!dg.orig[k]) continue;
        const ti = shiftIndexByBusinessDays(dates, di, step, pl, state);
        if (ti < 0) return;
        targets.push({ src: di, dst: ti });
      }
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (dg.orig[k]) delete nextCells[k];
      }
      for (let i = 0; i < targets.length; i++) {
        const srcKey = dates[targets[i].src];
        const dstKey = dates[targets[i].dst];
        const cell = dg.orig[srcKey];
        if (!cell) continue;
        nextCells[dstKey] = JSON.parse(JSON.stringify(cell));
      }
      changed = step !== 0;
    } else if (dg.mode === "resize-left") {
      const si = startIdx;
      const ei = endIdx;
      if (step > 0) {
        const nextSi = shiftIndexByBusinessDays(dates, si, step, pl, state);
        if (nextSi < 0) return;
        for (let di = si; di < nextSi && di <= ei; di++) {
          clearInputCell(nextCells, dates[di]);
        }
      } else if (step < 0) {
        let addIdx = si;
        let need = -step;
        while (need > 0) {
          addIdx--;
          if (addIdx < 0) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          const util0 = pl.utilization == null ? 1 : Number(pl.utilization);

          let nextCell = nextCells[dates[addIdx]];
          if (!nextCell || typeof nextCell !== "object" || nextCell === true) nextCell = {};
          nextCell.util = {};
          nextCells[dates[addIdx]] = nextCell;

          need--;
        }
      }
      changed = step !== 0;
    } else if (dg.mode === "resize-right") {
      const si = startIdx;
      const ei = endIdx;
      if (step < 0) {
        const nextEi = shiftIndexByBusinessDays(dates, ei, step, pl, state);
        if (nextEi < 0) return;
        for (let di = ei; di > nextEi && di >= si; di--) {
          clearInputCell(nextCells, dates[di]);
        }
      } else if (step > 0) {
        let addIdx = ei;
        let need = step;
        while (need > 0) {
          addIdx++;
          if (addIdx >= dates.length) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          const util0 = pl.utilization == null ? 1 : Number(pl.utilization);

          let nextCell = nextCells[dates[addIdx]];
          if (!nextCell || typeof nextCell !== "object" || nextCell === true) nextCell = {};
          nextCell.util = {};
          nextCells[dates[addIdx]] = nextCell;
          
          need--;
        }
      }
      changed = step !== 0;
    } else {
      return;
    }

    const touched = applyPlanCellsDomDiff(pl, prevDraft, nextCells, dates, dg.cellDomCache);
    dg.touchedDates = touched;
    dg.draftCells = nextCells;
    dg.lastStep = step;
    dg.changed = changed;
  }

  async function saveData() {
    // file:// で開いた場合、ブラウザによっては File System Access API が制限されることがある
    const text = serializeJs(cloneForSave(state.data));
    try {
      if (isWri() && window.wri && window.wri.io && window.wri.io.file && window.wri.io.file.SaveTo) {
        window.wri.io.file.SaveTo("gantt_data.js", text);
      } else if (window.showSaveFilePicker) {
        const handle = state.fileHandle || await window.showSaveFilePicker({
          suggestedName: "gantt_data.js",
          types: [{ description: "JS", accept: { "application/javascript": [".js"] } }],
        });
        const w = await handle.createWritable();
        await w.write(text);
        await w.close();
        state.fileHandle = handle;
      } else {
        alert("この環境では File System Access API が使えません。");
        return;
      }
      markDirty(state, false);
      alert("保存しました。");
      renderTop();
    } catch (err) {
      console.error(err);
      alert("保存に失敗しました: " + (err && err.message ? err.message : String(err)));
    }
  }

  function renderAll() {
    ensurePhaseKeys(state);
    eachPlan(state, (pl) => {
      recomputeAllPhaseFromCells(pl);
      pl.plannedEnd = computePlannedEnd(pl, state);
    });
    document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    if (state.topPaneHeight == null) {
      document.documentElement.style.setProperty("--topH", "auto");
    } else {
      const appRect = appRoot.getBoundingClientRect();
      const minTop = 80;
      const maxTop = Math.max(minTop, appRect.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
    leftPane.classList.toggle("hidden", !state.inputPaneVisible);
    resizer.classList.toggle("hidden", !state.inputPaneVisible);
    renderTop();
    renderTree();
    renderGantt();
  }

  let resizingX = false;
  let resizingY = false;
  resizer.addEventListener("mousedown", (e) => {
    resizingX = true;
    e.preventDefault();
  });
  hResizer.addEventListener("mousedown", (e) => {
    resizingY = true;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (resizingX) {
      const r = bottomPane.getBoundingClientRect();
      state.leftPaneWidth = Math.min(Math.max(e.clientX - r.left, 200), r.width * 0.7);
      document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    }
    if (resizingY) {
      const r = appRoot.getBoundingClientRect();
      const minTop = 40;
      const maxTop = Math.max(minTop, r.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(e.clientY - r.top, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
  });
  window.addEventListener("mouseup", () => {
    resizingX = false;
    resizingY = false;
  });
  window.addEventListener("resize", () => {
    if (state.topPaneHeight == null) return;
    const r = appRoot.getBoundingClientRect();
    const minTop = 80;
    const maxTop = Math.max(minTop, r.height * 0.7);
    state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
    document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
  });

  window.addEventListener("beforeunload", (e) => {
    if (state.dirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
  window.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
      e.preventDefault();
      saveData();
    }
  });

  initData();
  renderAll();
})();
  </script>
</body>
