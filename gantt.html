<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ガント</title>
  <script>
    window.__GANTT_DATA__ = null;
    window.__GANTT_DATA_LOADED__ = false;
  </script>
  <script src="gantt_data.js" onerror="window.__GANTT_DATA_LOADED__=false;"></script>
  <script>window.__GANTT_DATA_LOADED__ = !!window.__GANTT_DATA__;</script>
  <style>
    :root {
      --border: #c8c8c8;
      --bg-top: #f4f4f4;
      --bg-darkcol: #3a3f45;
      --bg-cell: #fff;
      --accent: #2a6fbb;
      --selected: #fff3bf;
      --actual-bar: #444;
      --holiday-sat: #e9f6ff;
      --holiday-sun: #ffeef0;
      --holiday-strong: #ffd7dc;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); font-size: 13px; }
    #app { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    #topPane {
      flex: 0 0 var(--topH, auto); background: var(--bg-top); border-bottom: 1px solid var(--border);
      padding: 8px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; overflow: auto;
    }
    .topBlock { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    .topBlock label { font-weight: 600; font-size: 11px; color: #333; }
    .listbox {
      height: 110px; min-width: 160px; border: 1px solid var(--border); padding: 2px;
      overflow: auto; background: #fff;
    }
    .listbox option { padding: 2px 4px; }
    .rowBtns { display: flex; gap: 4px; flex-wrap: wrap; }
    .rowBtns input[type="text"] { width: 100px; }
    .listManageBody { display: flex; gap: 6px; align-items: flex-start; }
    .listManageBtns { display: flex; flex-direction: column; gap: 4px; min-width: 110px; }
    .listManageBtns input[type="text"] { width: 110px; }
    #hResizer {
      flex: 0 0 6px; cursor: row-resize; background: #e0e0e0;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    #bottomPane { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
    #leftPane {
      flex: 0 0 var(--leftW, 340px); min-width: 200px; max-width: 70%;
      border-right: 1px solid var(--border); overflow: auto; background: #fafafa;
    }
    #leftPane.hidden { display: none; }
    #resizer {
      flex: 0 0 6px; cursor: col-resize; background: #e0e0e0; border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    #resizer.hidden { display: none; }
    #rightWrap { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    #ganttVScroll { flex: 1 1 auto; overflow: auto; min-height: 0; }
    table.gantt { border-collapse: collapse; table-layout: fixed; }
    table.gantt td, table.gantt th {
      border: 1px solid var(--border); padding: 2px 4px; vertical-align: middle;
    }
    .treeHead { width: 120px; background: #eee; position: sticky; left: 0; z-index: 3; }
    .treeHead2 { width: 140px; background: #eee; position: sticky; left: 120px; z-index: 3; }
    .dayHead { width: 28px; font-size: 8px; line-height: 1.1; text-align: center; background: #eaeaea; font-weight: 500; padding: 1px 0; }
    .daycell { width: 28px; height: 22px; padding: 0; text-align: center; font-size: 9px; cursor: cell; user-select: none; vertical-align: top; }
    .daycell.dark { background: var(--bg-darkcol); color: #bbb; cursor: default; }
    .daycell .fill { display: block; height: 100%; width: 100%; min-height: 18px; box-sizing: border-box; margin: 0; padding: 0; }
    .daycell.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
    .daycell .actual {
      height: 3px; margin-top: 1px; background: var(--actual-bar); border-radius: 1px;
    }
    .nameCell { cursor: pointer; }
    .nameCell input { width: 100%; box-sizing: border-box; }
    .planRow.selected td.treeHead, .planRow.selected td.treeHead2 { background: var(--selected); }
    .muted { color: #666; font-size: 11px; }
    button { cursor: pointer; }
    .treeRow { background: #fff; }
    .indent { padding-left: 6px; }
    .planFields { display: flex; flex-direction: column; gap: 6px; font-size: 11px; margin: 4px 0 4px 4px; }
    .planRowH { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px 8px; }
    .planRowH label { display: flex; flex-direction: column; gap: 1px; font-size: 10px; white-space: nowrap; }
    .planRowH input, .planRowH select { font-size: 11px; max-width: 9em; }
    .saveBar { display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topPane"></div>
    <div id="hResizer"></div>
    <div id="bottomPane">
      <div id="leftPane"></div>
      <div id="resizer"></div>
      <div id="rightWrap">
        <div id="ganttVScroll"></div>
      </div>
    </div>
  </div>
  <script>
(function () {
  function toDateString(date) {
    const d = date instanceof Date ? date : new Date(date);
    const diff = d.getTimezoneOffset() * 60 * 1000;
    const adj = new Date(d.getTime() - diff);
    return adj.toISOString().slice(0, 10);
  }
  function parseYMD(s) {
    if (!s) return null;
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s));
    if (!m) return null;
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }
  function addDays(ymd, n) {
    const d = parseYMD(ymd);
    if (!d) return ymd;
    d.setDate(d.getDate() + n);
    return toDateString(d);
  }
  function daysBetween(a, b) {
    const da = parseYMD(a), db = parseYMD(b);
    if (!da || !db) return 0;
    return Math.round((db - da) / 86400000);
  }
  function uid() { return "id_" + Math.random().toString(36).slice(2, 10); }

  /** plan セル内の左右端判定（ドラッグの resize と同じ幅） */
  const PLAN_CELL_EDGE_PX = 8;

  function emptyData() {
    return {
      phases: ["all"],
      cases: [],
      members: [],
      statuses: [{ id: "st_open", name: "Open" }],
      commonHolidays: [],
      domains: [],
    };
  }

  function migratePlanCellsToDayModel(pl) {
    const u0 = pl.utilization == null ? 1 : Number(pl.utilization);
    Object.keys(pl.cells || {}).forEach((ds) => {
      const c = pl.cells[ds];
      if (c == null || c === true) {
        if (c === true) pl.cells[ds] = {};
        return;
      }
      if (typeof c !== "object") {
        delete pl.cells[ds];
        return;
      }
      const h = Number(c.byPhase && c.byPhase.all != null ? c.byPhase.all : c.hours) || 0;
      if (h <= 0.001 && !c.util) {
        delete pl.cells[ds];
        return;
      }
      const cap = 8 * u0;
      if (c.util != null && !c.byPhase && c.hours == null) {
        pl.cells[ds] = Math.abs(Number(c.util) - u0) < 1e-5 ? {} : { util: Number(c.util) };
        return;
      }
      if (h > 0.001) {
        const impliedU = h / 8;
        pl.cells[ds] = Math.abs(impliedU - u0) < 1e-4 || Math.abs(h - cap) < 0.05 ? {} : { util: impliedU };
      }
    });
  }

  function normalizeLoaded(raw) {
    const d = raw && typeof raw === "object" ? raw : emptyData();
    if (!Array.isArray(d.phases)) d.phases = ["all"];
    if (!d.phases.includes("all")) d.phases = ["all"].concat(d.phases.filter((p) => p !== "all"));
    if (!Array.isArray(d.cases)) d.cases = [];
    if (!Array.isArray(d.members)) d.members = [];
    if (!Array.isArray(d.statuses)) d.statuses = [{ id: "st_open", name: "Open" }];
    if (!Array.isArray(d.commonHolidays)) d.commonHolidays = [];
    if (!Array.isArray(d.domains)) d.domains = [];
    d.domains.forEach((dom) => {
      dom.projects = dom.projects || [];
      dom.projects.forEach((pr) => {
        pr.versions = pr.versions || [];
        pr.versions.forEach((vr) => {
          vr.tasks = vr.tasks || [];
          vr.tasks.forEach((tk) => {
            tk.plans = tk.plans || [];
            tk.plans.forEach((pl) => {
              pl.utilization = pl.utilization == null ? 1 : Number(pl.utilization);
              pl.phaseHours = pl.phaseHours || {};
              pl.cells = pl.cells || {};
              if (pl.statusId === undefined) pl.statusId = d.statuses[0] && d.statuses[0].id || null;
              migratePlanCellsToDayModel(pl);
              d.phases.forEach((ph) => {
                if (!pl.phaseHours[ph]) pl.phaseHours[ph] = { planned: 0, actual: 0 };
              });
            });
          });
        });
      });
    });
    return d;
  }

  function cloneForSave(data) {
    return JSON.parse(JSON.stringify(data));
  }

  function serializeJs(data) {
    return "window.__GANTT_DATA__ = " + JSON.stringify(data, null, 2) + ";\n";
  }

  /** phase 工数はフォームから直接編集（all 以外は管理用・チャート非表示） */
  function syncPhaseTotalsFromField(state, plan, phaseId, field, newNum) {
    const ph = plan.phaseHours;
    if (!ph[phaseId]) ph[phaseId] = { planned: 0, actual: 0 };
    ph[phaseId][field] = Math.max(0, Number(newNum) || 0);
  }

  function ensurePhaseKeys(state) {
    const phases = state.data.phases;
    state.data.domains.forEach((dom) =>
      (dom.projects || []).forEach((pr) =>
        (pr.versions || []).forEach((vr) =>
          (vr.tasks || []).forEach((tk) =>
            (tk.plans || []).forEach((pl) => {
              pl.phaseHours = pl.phaseHours || {};
              phases.forEach((ph) => {
                if (!pl.phaseHours[ph]) pl.phaseHours[ph] = { planned: 0, actual: 0 };
              });
              Object.keys(pl.phaseHours).forEach((k) => {
                if (!phases.includes(k)) delete pl.phaseHours[k];
              });
            })
          )
        )
      )
    );
  }

  function cellIsOn(plan, dateStr) {
    const c = plan.cells[dateStr];
    if (c == null) return false;
    if (c === true) return true;
    if (typeof c !== "object") return false;
    if (c.byPhase && Number(c.byPhase.all) > 0) return true;
    if (Number(c.hours) > 0) return true;
    return true;
  }

  function effectiveCellUtil(plan, dateStr) {
    const c = plan.cells[dateStr];
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    if (!cellIsOn(plan, dateStr)) return u0;
    if (c && typeof c === "object" && c.util != null) return Number(c.util) || u0;
    return u0;
  }

  /** チャート表示・all 集計用（1日=8hr×稼働率） */
  function dayHoursAll(plan, dateStr) {
    return cellIsOn(plan, dateStr) ? 8 * effectiveCellUtil(plan, dateStr) : 0;
  }

  function displayedHoursForDate(plan, dateStr) {
    return dayHoursAll(plan, dateStr);
  }

  function hasDisplayedHours(plan, dateStr) {
    return cellIsOn(plan, dateStr);
  }

  function recomputeAllPhaseFromCells(plan) {
    const keys = Object.keys(plan.cells || {});
    let sumAll = 0;
    keys.forEach((ds) => {
      sumAll += dayHoursAll(plan, ds);
    });
    if (!plan.phaseHours.all) plan.phaseHours.all = { planned: 0, actual: 0 };
    if (keys.length > 0) plan.phaseHours.all.planned = sumAll;
  }

  function isWeekendYMD(ymd) {
    const d = parseYMD(ymd);
    if (!d) return false;
    const w = d.getDay();
    return w === 0 || w === 6;
  }

  function weekendTypeYMD(ymd) {
    const d = parseYMD(ymd);
    if (!d) return "";
    const w = d.getDay();
    if (w === 6) return "saturday";
    if (w === 0) return "sunday";
    return "";
  }

  function holidayTypeForDate(ymd, plan, state) {
    const mem = state.data.members.find((m) => m.id === plan.ownerId);
    if (mem && Array.isArray(mem.holidays) && mem.holidays.includes(ymd)) return "member";
    if (state.data.commonHolidays.includes(ymd)) return "common";
    return weekendTypeYMD(ymd);
  }

  function holidayTypeForHeaderDate(ymd, state) {
    if (state.data.commonHolidays.includes(ymd)) return "common";
    return weekendTypeYMD(ymd);
  }

  function holidayBgColor(type) {
    if (type === "member") return "var(--holiday-strong)";
    if (type === "common") return "var(--holiday-strong)";
    if (type === "sunday") return "var(--holiday-sun)";
    if (type === "saturday") return "var(--holiday-sat)";
    return "";
  }

  function isHolidayDate(ymd, plan, state) {
    return !!holidayTypeForDate(ymd, plan, state);
  }

  function capacityForDate(plan, ymd, state) {
    if (isHolidayDate(ymd, plan, state)) return 0;
    return 8 * (plan.utilization || 1);
  }

  function totalPlannedHours(plan, state) {
    return Number((plan.phaseHours.all && plan.phaseHours.all.planned) || 0);
  }

  function computePlannedEnd(plan, state) {
    const start = plan.plannedStart;
    if (!start) return "";
    const total = totalPlannedHours(plan, state);
    if (total <= 0) return start;
    let remain = total;
    let d = parseYMD(start);
    if (!d) return "";
    let last = toDateString(d);
    while (remain > 1e-6) {
      const ds = toDateString(d);
      const cap = capacityForDate(plan, ds, state);
      if (cap > 0) {
        const use = Math.min(cap, remain);
        remain -= use;
        last = ds;
      }
      d.setDate(d.getDate() + 1);
      if (d.getTime() - parseYMD(start).getTime() > 86400000 * 3650) break;
    }
    let maxCell = start;
    Object.keys(plan.cells).forEach((ds) => {
      if (cellIsOn(plan, ds)) {
        if (daysBetween(start, ds) > daysBetween(start, maxCell)) maxCell = ds;
      }
    });
    return daysBetween(last, maxCell) >= 0 ? maxCell : last;
  }

  function earliestInputCellDate(plan) {
    let minDate = null;
    Object.keys(plan.cells || {}).forEach((ds) => {
      if (!cellIsOn(plan, ds)) return;
      if (!minDate || daysBetween(ds, minDate) > 0) minDate = ds;
    });
    return minDate;
  }

  function eachPlan(state, fn) {
    state.data.domains.forEach((dom) =>
      (dom.projects || []).forEach((pr) =>
        (pr.versions || []).forEach((vr) =>
          (vr.tasks || []).forEach((tk) =>
            (tk.plans || []).forEach((pl) => fn(pl, tk, vr, pr, dom))
          )
        )
      )
    );
  }

  function findPlan(state, planId) {
    let out = null;
    eachPlan(state, (pl) => { if (pl.id === planId) out = pl; });
    return out;
  }

  function findTaskForPlan(state, planId) {
    let tk = null;
    eachPlan(state, (pl, t) => { if (pl.id === planId) tk = t; });
    return tk;
  }

  function defaultColorForPlan(plan, state) {
    const m = state.data.members.find((x) => x.id === plan.ownerId);
    return (m && m.defaultColor) || "#8ab4e6";
  }

  function planBarColor(plan, state) {
    return plan.color || defaultColorForPlan(plan, state);
  }

  function getDateRange(state) {
    let minD = null, maxD = null;
    const bump = (s) => {
      if (!s) return;
      if (!minD || daysBetween(s, minD) > 0) minD = s;
      if (!maxD || daysBetween(maxD, s) > 0) maxD = s;
    };
    eachPlan(state, (pl) => {
      Object.keys(pl.cells || {}).forEach((ds) => {
        if (!cellIsOn(pl, ds)) return;
        bump(ds);
      });
    });
    if (!minD || !maxD) {
      const today = toDateString(new Date());
      minD = addDays(today, -14);
      maxD = addDays(today, 14);
    } else {
      minD = addDays(minD, -14);
      maxD = addDays(maxD, 14);
    }
    const out = [];
    let cur = parseYMD(minD);
    const end = parseYMD(maxD);
    while (cur <= end) {
      out.push(toDateString(cur));
      cur.setDate(cur.getDate() + 1);
    }
    return out;
  }

  function markDirty(state, v) {
    state.dirty = v;
  }

  function isWri() {
    return /wri\/1\.0/i.test(navigator.userAgent || "");
  }

  const state = {
    data: emptyData(),
    caseFilter: [],
    selectedPlanId: null,
    leftPaneWidth: 340,
    topPaneHeight: null,
    inputPaneVisible: true,
    dirty: false,
    fileHandle: null,
    drag: null,
  };

  function initData() {
    const raw = window.__GANTT_DATA_LOADED__ && window.__GANTT_DATA__ != null
      ? window.__GANTT_DATA__
      : emptyData();
    state.data = normalizeLoaded(raw);
    ensurePhaseKeys(state);
    eachPlan(state, (pl) => {
      recomputeAllPhaseFromCells(pl);
      pl.plannedEnd = computePlannedEnd(pl, state);
    });
    markDirty(state, false);
  }

  const topPane = document.getElementById("topPane");
  const hResizer = document.getElementById("hResizer");
  const leftPane = document.getElementById("leftPane");
  const resizer = document.getElementById("resizer");
  const ganttVScroll = document.getElementById("ganttVScroll");
  const bottomPane = document.getElementById("bottomPane");
  const appRoot = document.getElementById("app");

  function renderTop() {
    const d = state.data;
    topPane.innerHTML = "";
    function mkListbox(id, items, opts) {
      const wrap = document.createElement("div");
      wrap.className = "topBlock";
      const lab = document.createElement("label");
      lab.textContent = opts.label;
      const sel = document.createElement("select");
      sel.id = id;
      sel.className = "listbox";
      sel.multiple = true;
      sel.size = 6;
      items.forEach((it) => {
        const o = document.createElement("option");
        o.value = it.value;
        o.textContent = it.label;
        sel.appendChild(o);
      });
      const row = document.createElement("div");
      row.className = "rowBtns";
      const bClear = document.createElement("button");
      bClear.type = "button";
      bClear.textContent = "選択解除";
      bClear.addEventListener("click", () => {
        Array.from(sel.options).forEach((o) => { o.selected = false; });
        opts.onChange(Array.from(sel.selectedOptions).map((x) => x.value));
      });
      row.appendChild(bClear);
      sel.addEventListener("change", () => {
        opts.onChange(Array.from(sel.selectedOptions).map((x) => x.value));
      });
      wrap.appendChild(lab);
      wrap.appendChild(sel);
      wrap.appendChild(row);
      return { wrap, sel };
    }

    const save = document.createElement("div");
    save.className = "topBlock saveBar";
    const bSave = document.createElement("button");
    bSave.type = "button";
    bSave.textContent = "保存 (Ctrl+S)";
    bSave.addEventListener("click", () => { saveData(); });
    const span = document.createElement("span");
    span.className = "muted";
    span.textContent = state.dirty ? "未保存の変更あり" : "保存済み";
    save.appendChild(bSave);
    save.appendChild(span);
    topPane.appendChild(save);

    const bToggle = document.createElement("button");
    bToggle.type = "button";
    bToggle.textContent = state.inputPaneVisible ? "入力ペインを隠す" : "入力ペインを表示";
    bToggle.addEventListener("click", () => {
      state.inputPaneVisible = !state.inputPaneVisible;
      leftPane.classList.toggle("hidden", !state.inputPaneVisible);
      resizer.classList.toggle("hidden", !state.inputPaneVisible);
      renderTop();
    });
    topPane.appendChild(bToggle);

    const ph = mkListbox("selPhase", d.phases.map((p) => ({ value: p, label: p })), {
      label: "phase",
      onChange: () => {},
    });
    const phBody = document.createElement("div");
    phBody.className = "listManageBody";
    const phBtns = document.createElement("div");
    phBtns.className = "listManageBtns";
    const phInp = document.createElement("input");
    phInp.type = "text";
    phInp.placeholder = "new phase";
    const phAdd = document.createElement("button");
    phAdd.type = "button";
    phAdd.textContent = "追加";
    phAdd.addEventListener("click", () => {
      const name = (phInp.value || "").trim();
      if (!name || name === "all" || d.phases.includes(name)) return;
      d.phases.push(name);
      ensurePhaseKeys(state);
      phInp.value = "";
      markDirty(state, true);
      renderAll();
    });
    const phDel = document.createElement("button");
    phDel.type = "button";
    phDel.textContent = "削除";
    phDel.addEventListener("click", () => {
      const pick = Array.from(ph.sel.selectedOptions).map((x) => x.value).filter((x) => x !== "all");
      pick.forEach((p) => {
        d.phases = d.phases.filter((x) => x !== p);
      });
      ensurePhaseKeys(state);
      markDirty(state, true);
      renderAll();
    });
    phBtns.appendChild(phInp);
    phBtns.appendChild(phAdd);
    phBtns.appendChild(phDel);
    ph.wrap.removeChild(ph.sel);
    phBody.appendChild(ph.sel);
    phBody.appendChild(phBtns);
    ph.wrap.insertBefore(phBody, ph.wrap.lastChild);
    topPane.appendChild(ph.wrap);

    const cs = mkListbox("selCase", d.cases.map((c) => ({ value: c.id, label: c.name || c.id })), {
      label: "case",
      onChange: (vals) => { state.caseFilter = vals; renderAll(); },
    });
    Array.from(cs.sel.options).forEach((o) => {
      o.selected = state.caseFilter && state.caseFilter.includes(o.value);
    });
    const csBody = document.createElement("div");
    csBody.className = "listManageBody";
    const csBtns = document.createElement("div");
    csBtns.className = "listManageBtns";
    const csInp = document.createElement("input");
    csInp.type = "text";
    csInp.placeholder = "new case";
    const csAdd = document.createElement("button");
    csAdd.type = "button";
    csAdd.textContent = "追加";
    csAdd.addEventListener("click", () => {
      const name = (csInp.value || "").trim();
      if (!name) return;
      const id = uid();
      d.cases.push({ id, name });
      csInp.value = "";
      markDirty(state, true);
      renderAll();
    });
    const csDel = document.createElement("button");
    csDel.type = "button";
    csDel.textContent = "削除";
    csDel.addEventListener("click", () => {
      const pick = Array.from(cs.sel.selectedOptions).map((x) => x.value);
      d.cases = d.cases.filter((c) => !pick.includes(c.id));
      state.caseFilter = (state.caseFilter || []).filter((id) => d.cases.some((c) => c.id === id));
      markDirty(state, true);
      renderAll();
    });
    csBtns.appendChild(csInp);
    csBtns.appendChild(csAdd);
    csBtns.appendChild(csDel);
    cs.wrap.removeChild(cs.sel);
    csBody.appendChild(cs.sel);
    csBody.appendChild(csBtns);
    cs.wrap.insertBefore(csBody, cs.wrap.lastChild);
    topPane.appendChild(cs.wrap);

    const mem = document.createElement("div");

  function validateCaseOwner(task, plan) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    return !(task.plans || []).some((p) => p.id !== plan.id && (p.caseId || "") + "|" + (p.ownerId || "") === key);
  }

  function applyColorToCaseOwner(task, plan, color) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    (task.plans || []).forEach((p) => {
      if ((p.caseId || "") + "|" + (p.ownerId || "") === key) p.color = color;
    });
  }

  function planMatchesCaseFilter(pl) {
    if (!state.caseFilter || state.caseFilter.length === 0) return true;
    return state.caseFilter.includes(pl.caseId || "");
  }

  function contiguousBlock(plan, dateStr, state, datesOverride) {
    const dates = datesOverride || getDateRange(state);
    const idx = dates.indexOf(dateStr);
    if (idx < 0) return { start: dateStr, end: dateStr };
    let s = idx, e = idx;
    let li = s - 1;
    while (li >= 0) {
      if (hasDisplayedHours(plan, dates[li])) {
        s = li;
        li--;
        continue;
      }
      if (isHolidayDate(dates[li], plan, state)) {
        li--;
        continue;
      }
      break;
    }
    let ri = e + 1;
    while (ri < dates.length) {
      if (hasDisplayedHours(plan, dates[ri])) {
        e = ri;
        ri++;
        continue;
      }
      if (isHolidayDate(dates[ri], plan, state)) {
        ri++;
        continue;
      }
      break;
    }
    return { start: dates[s], end: dates[e], startIdx: s, endIdx: e };
  }

  function planCellInteractionMode(pl, dateStr, localX, cellWidth, datesOverride) {
    const blk = contiguousBlock(pl, dateStr, state, datesOverride);
    if (!hasDisplayedHours(pl, dateStr)) return "click";
    if (dateStr === blk.start && localX < PLAN_CELL_EDGE_PX) return "resize-left";
    if (dateStr === blk.end && localX > cellWidth - PLAN_CELL_EDGE_PX) return "resize-right";
    return "move";
  }

  function cursorForPlanCellMode(mode) {
    if (mode === "resize-left" || mode === "resize-right") return "ew-resize";
    if (mode === "move") return "move";
    return "";
  }

  function shiftIndexByBusinessDays(dates, startIdx, step, plan, state) {
    if (step === 0) return startIdx;
    let idx = startIdx;
    let remain = Math.abs(step);
    const dir = step > 0 ? 1 : -1;
    while (remain > 0) {
      idx += dir;
      if (idx < 0 || idx >= dates.length) return -1;
      if (!isHolidayDate(dates[idx], plan, state)) remain--;
    }
    return idx;
  }

  const WD_JP = ["日", "月", "火", "水", "木", "金", "土"];

  function weekdayJp(ymd) {
    const d = parseYMD(ymd);
    return d ? WD_JP[d.getDay()] : "";
  }

        if (bgFn) th.style.background = bgFn(ds) || "";

      tbl.appendChild(tr);

    addDayHeaderRow((ds) => ds.slice(0, 4));
    addDayHeaderRow((ds) => ds.slice(5, 7));
    addDayHeaderRow((ds) => ds.slice(8, 10), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state)));
    addDayHeaderRow((ds) => weekdayJp(ds), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state)));

    function addDPVRow(label) {
      const tr = document.createElement("tr");
      tr.className = "treeRow";

    function appendPlanDayCells(tr, pl) {
      dates.forEach((ds) => {
        const td = document.createElement("td");
        td.className = "daycell" + (state.selectedPlanId === pl.id ? " selected" : "");
        const hrs = dayHoursAll(pl, ds);
        const cap = hrs > 0 ? hrs : 8 * (pl.utilization || 1);
        const base = planBarColor(pl, state);
        const holType = holidayTypeForDate(ds, pl, state);
        const fill = document.createElement("span");
        fill.className = "fill";
        if (hrs > 0) {
          td.style.background = base;
          fill.style.background = "transparent";
        } else {
          td.style.background = holidayBgColor(holType) || "";
          fill.style.background = "";
        }
        const uShow = cellIsOn(pl, ds) && Math.abs(effectiveCellUtil(pl, ds) - (pl.utilization || 1)) > 1e-5;
        fill.textContent = uShow ? String(effectiveCellUtil(pl, ds)) : "";
        fill.style.color = hrs > 0 ? "#111" : "";
        fill.style.fontSize = "9px";
        fill.style.lineHeight = "20px";

        const actH = actualHoursOnDate(pl, ds, state);
        const actBar = document.createElement("div");
        actBar.className = "actual";
        actBar.style.opacity = actH > 0 ? "1" : "0";

        td.appendChild(fill);
        td.appendChild(actBar);

        td.dataset.date = ds;
        td.dataset.planId = pl.id;

        td.addEventListener("mousemove", (e) => {
          const r = td.getBoundingClientRect();
          const localX = e.clientX - r.left;
          const m = planCellInteractionMode(pl, ds, localX, r.width, dates);
          td.style.cursor = cursorForPlanCellMode(m) || "cell";
        });
        td.addEventListener("mouseleave", () => {
          td.style.cursor = "";
        });

        td.addEventListener("pointerdown", (e) => onCellPointerDown(e, pl, ds, dates));
        tr.appendChild(td);
      });
    }

    function appendTaskPlanRows(tk) {
      const vis = (tk.plans || []).filter(planMatchesCaseFilter);
      const n = Math.max(1, vis.length);
      if (vis.length === 0) {
        const tr = document.createElement("tr");
        tr.className = "treeRow";
        const t2 = document.createElement("td");
        t2.className = "treeHead nameCell";
        t2.textContent = tk.name;
        const t3 = document.createElement("td");
        t3.className = "treeHead2 muted";
        t3.textContent = "—";
        tr.appendChild(t2);
        tr.appendChild(t3);
        dates.forEach(() => {
          const c = document.createElement("td");
          c.className = "daycell";
          c.style.background = "#eee";
          tr.appendChild(c);
        });
        tbl.appendChild(tr);
        return;
      }
      vis.forEach((pl, i) => {
        const tr = document.createElement("tr");
        tr.className = "planRow" + (state.selectedPlanId === pl.id ? " selected" : "");
        if (i === 0) {
          const t2 = document.createElement("td");
          t2.className = "treeHead nameCell";
          t2.rowSpan = n;
          t2.textContent = tk.name;
          tr.appendChild(t2);
        }
        const tPlan = document.createElement("td");
        tPlan.className = "treeHead2 nameCell";
        tPlan.textContent = pl.name;
        tPlan.addEventListener("click", () => {
          state.selectedPlanId = pl.id;
          renderAll();
        });
        tr.appendChild(tPlan);
        appendPlanDayCells(tr, pl);
        tbl.appendChild(tr);
      });
    }

    state.data.domains.forEach((dom) => {
      addDPVRow(dom.name);
      (dom.projects || []).forEach((pr) => {
        addDPVRow(pr.name);
        (pr.versions || []).forEach((vr) => {
          addDPVRow(vr.name);
          (vr.tasks || []).forEach((tk) => {
            appendTaskPlanRows(tk);
          });
        });
      });
    });

    ganttVScroll.innerHTML = "";
    ganttVScroll.appendChild(tbl);
  }

  function actualHoursOnDate(pl, ds, state) {
    const tot = Number((pl.phaseHours.all && pl.phaseHours.all.actual) || 0);
    if (tot <= 0) return 0;
    if (!pl.actualStart || !pl.actualEnd) return 0;
    if (daysBetween(pl.actualStart, ds) >= 0 && daysBetween(ds, pl.actualEnd) >= 0) {
      const span = Math.max(1, daysBetween(pl.actualStart, pl.actualEnd) + 1);
      return tot / span;
    }
    return 0;
  }

  function cycleCellUtil(plan, ds) {
    const cell = plan.cells[ds] || (plan.cells[ds] = {});
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    const seq = [0.5, 1, 1.5, 2, u0];
    const curU = effectiveCellUtil(plan, ds);
    const idx = seq.findIndex((u) => Math.abs(u - curU) < 1e-5);
    const next = seq[(Math.max(0, idx) + 1) % seq.length];
    if (Math.abs(next - u0) < 1e-5) {
      if (typeof cell === "object") delete cell.util;
    } else if (typeof cell === "object") cell.util = next;
    markDirty(state, true);
  }

  function onCellPointerDown(e, pl, ds, dates) {
    if (e.button !== 0) return;
    const td = e.currentTarget;
    const rect = td.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const blk = contiguousBlock(pl, ds, state, dates);
    let mode = "move";
    if (cellIsOn(pl, ds)) {
      if (ds === blk.start && x < PLAN_CELL_EDGE_PX) mode = "resize-left";
      else if (ds === blk.end && x > rect.width - PLAN_CELL_EDGE_PX) mode = "resize-right";
      else mode = "move";
    } else {
      mode = "click";
    }
    state.drag = {
      mode,
      planId: pl.id,
      startDate: ds,
      block: blk,
      startX: e.clientX,
      orig: JSON.parse(JSON.stringify(pl.cells)),
      frozenDates: dates.slice(),
      lastStep: 0,
      changed: false,
      dragMoved: false,
    };
    td.setPointerCapture(e.pointerId);
    const pln = findPlan(state, pl.id);
    const onMove = (ev) => {
      const dg0 = state.drag;
      if (!dg0) return;
      if (dg0.mode === "click") {
        if (Math.abs(ev.clientX - dg0.startX) > 4) dg0.dragMoved = true;
        return;
      }
      dg0.dragMoved = true;
      onCellPointerMove(ev, pln);
    };
    const onUp = (ev) => {
      td.releasePointerCapture(ev.pointerId);
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      const dg = state.drag;
      if (dg && pln) {
        if (dg.mode === "click" && !dg.dragMoved && pln) {
          if (!cellIsOn(pln, ds)) {
            pln.cells[ds] = {};
            const minCellDate = earliestInputCellDate(pln);
            if (minCellDate) pln.plannedStart = minCellDate;
            recomputeAllPhaseFromCells(pln);
            pln.plannedEnd = computePlannedEnd(pln, state);
            markDirty(state, true);
          }
        } else if (dg.mode === "move" && !dg.dragMoved && cellIsOn(pln, ds)) {
          cycleCellUtil(pln, ds);
          recomputeAllPhaseFromCells(pln);
          pln.plannedEnd = computePlannedEnd(pln, state);
        } else if (dg.changed) {
          const minCellDate = earliestInputCellDate(pln);
          if (minCellDate) pln.plannedStart = minCellDate;
          pln.plannedEnd = computePlannedEnd(pln, state);
          markDirty(state, true);
        }
      }
      state.drag = null;
      renderAll();
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }

  function onCellPointerMove(e, pl) {
    const dg = state.drag;
    if (!dg || !pl || dg.planId !== pl.id) return;
    const dates = dg.frozenDates && dg.frozenDates.length ? dg.frozenDates : getDateRange(state);
    const dayW = 28;
    const dx = e.clientX - dg.startX;
    const step = Math.round(dx / dayW);
    if (step === dg.lastStep) return;

    const { startIdx, endIdx } = dg.block || {};
    if (startIdx == null || endIdx == null) return;

    const nextCells = JSON.parse(JSON.stringify(dg.orig || {}));
    let changed = false;

    if (dg.mode === "move") {
      const targets = [];
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (!dg.orig[k]) continue;
        const ti = shiftIndexByBusinessDays(dates, di, step, pl, state);
        if (ti < 0) return;
        targets.push({ src: di, dst: ti });
      }
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (dg.orig[k]) delete nextCells[k];
      }
      for (let i = 0; i < targets.length; i++) {
        const srcKey = dates[targets[i].src];
        const dstKey = dates[targets[i].dst];
        const cell = dg.orig[srcKey];
        if (!cell) continue;
        nextCells[dstKey] = JSON.parse(JSON.stringify(cell));
      }
      changed = step !== 0;
    } else if (dg.mode === "resize-left") {
      let si = startIdx;
      let ei = endIdx;
      if (step > 0) {
        const nextSi = shiftIndexByBusinessDays(dates, si, step, pl, state);
        if (nextSi < 0) return;
        for (let di = si; di < nextSi && di <= ei; di++) {
          delete nextCells[dates[di]];
        }
      } else if (step < 0) {
        let addIdx = si;
        let need = -step;
        while (need > 0) {
          addIdx--;
          if (addIdx < 0) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          nextCells[dates[addIdx]] = {};
          need--;
        }
      }
      changed = step !== 0;
    } else if (dg.mode === "resize-right") {
      let si = startIdx;
      let ei = endIdx;
      if (step < 0) {
        const nextEi = shiftIndexByBusinessDays(dates, ei, step, pl, state);
        if (nextEi < 0) return;
        for (let di = ei; di > nextEi && di >= si; di--) {
          delete nextCells[dates[di]];
        }
      } else if (step > 0) {
        let addIdx = ei;
        let need = step;
        while (need > 0) {
          addIdx++;
          if (addIdx >= dates.length) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          nextCells[dates[addIdx]] = {};
          need--;
        }
      }
      changed = step !== 0;
    } else {
      return;
    }

    pl.cells = nextCells;
    dg.lastStep = step;
    dg.changed = changed;
    recomputeAllPhaseFromCells(pl);
    pl.plannedEnd = computePlannedEnd(pl, state);
    renderGantt(dates);
  }

  async function saveData() {
    // file:// で開いた場合、ブラウザによっては File System Access API が制限されることがある
    const text = serializeJs(cloneForSave(state.data));
    try {
      if (isWri() && window.wri && window.wri.io && window.wri.io.file && window.wri.io.file.SaveTo) {
        window.wri.io.file.SaveTo("gantt_data.js", text);
      } else if (window.showSaveFilePicker) {
        const handle = state.fileHandle || await window.showSaveFilePicker({
          suggestedName: "gantt_data.js",
          types: [{ description: "JS", accept: { "application/javascript": [".js"] } }],
        });
        const w = await handle.createWritable();
        await w.write(text);
        await w.close();
        state.fileHandle = handle;
      } else {
        alert("この環境では File System Access API が使えません。");
        return;
      }
      markDirty(state, false);
      alert("保存しました。");
      renderTop();
    } catch (err) {
      console.error(err);
      alert("保存に失敗しました: " + (err && err.message ? err.message : String(err)));
    }
  }

  function renderAll() {
    ensurePhaseKeys(state);
    eachPlan(state, (pl) => {
      recomputeAllPhaseFromCells(pl);
      pl.plannedEnd = computePlannedEnd(pl, state);
    });
    document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    if (state.topPaneHeight == null) {
      document.documentElement.style.setProperty("--topH", "auto");
    } else {
      const appRect = appRoot.getBoundingClientRect();
      const minTop = 80;
      const maxTop = Math.max(minTop, appRect.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
    leftPane.classList.toggle("hidden", !state.inputPaneVisible);
    resizer.classList.toggle("hidden", !state.inputPaneVisible);
    renderTop();
    renderTree();
    renderGantt();
    syncHScroll();
  }

  let resizingX = false;
  let resizingY = false;
  resizer.addEventListener("mousedown", (e) => {
    resizingX = true;
    e.preventDefault();
  });
  hResizer.addEventListener("mousedown", (e) => {
    resizingY = true;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (resizingX) {
      const r = bottomPane.getBoundingClientRect();
      state.leftPaneWidth = Math.min(Math.max(e.clientX - r.left, 200), r.width * 0.7);
      document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    }
    if (resizingY) {
      const r = appRoot.getBoundingClientRect();
      const minTop = 80;
      const maxTop = Math.max(minTop, r.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(e.clientY - r.top, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
  });
  window.addEventListener("mouseup", () => {
    resizingX = false;
    resizingY = false;
  });
  window.addEventListener("resize", () => {
    if (state.topPaneHeight == null) return;
    const r = appRoot.getBoundingClientRect();
    const minTop = 80;
    const maxTop = Math.max(minTop, r.height * 0.7);
    state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
    document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
  });

  window.addEventListener("beforeunload", (e) => {
    if (state.dirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
  window.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
      e.preventDefault();
      saveData();
    }
  });

  initData();
  renderAll();
})();
  </script>
