<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ガント</title>
  <script>
    window.__GANTT_DATA__ = null;
    window.__GANTT_DATA_LOADED__ = false;
    window.__GANTT_VIEWER_MODE__ = false;
  </script>
  <script src="gantt.js" onerror="window.__GANTT_DATA_LOADED__=false;"></script>
  <script>window.__GANTT_DATA_LOADED__ = !!window.__GANTT_DATA__;</script>
  <style>
    :root {
      --border: #c8c8c8;
      --bg-top: #f4f4f4;
      --bg-darkcol: #3a3f45;
      --bg-cell: #fff;
      --accent: #2a6fbb;
      --selected: #fff3bf;
      --actual-bar: #444;
      --holiday-sat: #e9f6ff;
      --holiday-sun: #ffeef0;
      --holiday-strong: #ffd7dc;
      --specday-today: #fff3bf;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      --cal-head-row-h: 20px;
      --tree-head1-w: 250px;
      --tree-head2-w: 100px;

      --bg-header: #2f4cac;
      --bg-domain: #404050;
      --bg-project: #707080;
      --bg-version: #c8c8c8;
      --color-domain: #fff;
      --color-project: #fff;
      --color-version: #41205f;

      --input-pane-head_h: 33px;

      --z-index-comment: 109;
      --z-index-comment-line: 108;
      --z-index-header-caption: 99;
      --z-index-header: 98;
      --z-index-header-calendar: 97;
      --z-index-body-caption: 89;
      --z-index-body: 88;
      /* 入力ペイン */
      --z-index-input-tool: 19;
      --z-index-input-domain: 18;
      --z-index-input-project: 17;
      --z-index-input-version: 16;
      --z-index-input-task: 15;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); font-size: 13px; }
    #app { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    #topPane {
      flex: 0 0 var(--topH, auto); background: var(--bg-top); border-bottom: 1px solid var(--border);
      padding: 8px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; overflow: auto;
    }
    #topPane.hidden {
      display: none;
    }
    .topBlock { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    .topBlock label { font-weight: 600; font-size: 11px; color: #333; }
    .listbox {
      height: 110px; min-width: 120px; border: 1px solid var(--border); padding: 2px;
      overflow: auto; background: #fff;

      & .listboxItem {
        padding: 2px 4px;
      }
    }
    .listbox option { padding: 2px 4px; }
    .rowBtns {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .rowBtns input[type="text"] {
      width: 100px;
    }
    .listManageBody { display: flex; gap: 6px; align-items: flex-start; }
    .listManageBtns { display: flex; flex-direction: column; gap: 4px; min-width: 110px; }
    .listManageBtns input[type="text"] { width: 110px; }
    #hResizer {
      flex: 0 0 6px; cursor: row-resize; background: #e0e0e0;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    #hResizer.hidden {
      display: none;
    }
    #bottomPane { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
    #leftPane {
      flex: 0 0 var(--leftW, 340px); min-width: 200px; max-width: 70%;
      border-right: 1px solid var(--border); overflow: auto; background: #fafafa;
    }
    #leftPane.hidden {
      display: none;
    }
    #leftPane button.deleteBtn {
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      padding: 0 3px 2px 3px;
      border: 1px solid #aa4040;
      border-radius: 5px;
      background: #ee4040;
    }
    .inputPaneHeader {
      display: grid;
      grid-template-columns: 1fr 160px;

      height: var(--input-pane-head_h);
      font-weight: 600;
      margin: 0;
      padding: 6px;

      & .inputPaneHeaderTitle {
        grid-column: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      & .inputPaneHeaderTool {
        grid-column: 2;

        display: flex;
        flex-direction: row;
        justify-content: flex-end;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;

        & button {
          white-space: nowrap;
        }

        & .isPlanMode {
          display: flex;
          flex-direction: row;
          align-items: center;
          flex-wrap: nowrap;
        }
      }
    }
    .inputPaneToolHeader {
      background: var(--bg-header);
      border-color: 3a68ff;
      color: #fff;

      position: sticky;
      top: 0;
      z-index: var(--z-index-input-tool);
    }
    .milestoneSection {
      margin: 0;
      padding: 6px;

      & .milestoneTitle {
        font-weight: bold;
        margin-bottom: 6px;
      }

      & .milestoneForm {
        display: grid;
        grid-template-columns: 1fr auto;

        & input[type="date"] {
          grid-row: 2;
          grid-column: 1;
        }

        & input[type="text"] {
          grid-row: 1;
          grid-column: 1 / span 2;

          margin-bottom: 4px;
          padding: 4px;
        }

        & button {
          grid-row: 2;
          grid-column: 2;

          margin-left: 6px;
          cursor: pointer;
        }
      }

      & .milestoneList {
        max-height: 150px;
        overflow-y: auto;

        & .milestoneEmpty {
          color: #999;
          font-size: 12px;
        }

        & .milestoneItem {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 4px;
          background-color: #f5f5f5;
          margin-bottom: 3px;
          border-radius: 3px;

          & .milestoneItemText {
            font-size: 12px;
          }

          & .milestoneItemDeleteButton {
            padding: 0 4px;
            cursor: pointer;
            background-color: #fff;
            border: 1px solid #ccc;
          }
        }
      }
    }
    .inputPaneDomain {
      margin: 0;
      padding: 0;
      z-index: 1;
    }
    .inputPaneDomainHeader {
      background: var(--bg-domain);
      border-color: var(--bg-domain);
      color: var(--color-domain);

      position: sticky;
      top: calc(var(--input-pane-head_h) * 1);
      z-index: var(--z-index-input-domain);
    }
    .inputPaneProject {
      margin: 0;
      padding: 0;
    }
    .inputPaneProjectHeader {
      background: var(--bg-project);
      border-color: var(--bg-project);
      color: var(--color-project);

      position: sticky;
      top: calc(var(--input-pane-head_h) * 2);
      z-index: var(--z-index-input-project);
    }
    .inputPaneVersion {
      margin: 0;
      padding: 0;
    }
    .inputPaneVersionHeader {
      background: var(--bg-version);
      border-color: var(--bg-version);
      color: var(--color-version);

      position: sticky;
      top: calc(var(--input-pane-head_h) * 3);
      z-index: var(--z-index-input-version);
    }
    .inputPaneTask {
      margin: 0;
      padding: 0;
    }
    .inputPaneTaskHeader {
      background: #ddd;
      border-color: #ddd;

      position: sticky;
      top: calc(var(--input-pane-head_h) * 4);
      z-index: var(--z-index-input-task);
    }
    .inputPanePlan {
      margin: 4px;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .inputPanePlan.selected {
      background: var(--selected);
    }
    .inputPanePlanHeader {
      padding: 0;
    }
    .inputPanePlan .planFields {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      margin: 0;
    }

    .inputPanePlan table.hourTable {
      border-collapse: collapse;
      table-layout: fixed;
    }
    .inputPanePlan table.hourTable tr.hourTableHeaderRow th.hourTableHeaderLabel {
      width: 5em;
      padding: 2px 4px;
      background: #eee;
      border: 1px solid var(--border);
    }
    .inputPanePlan table.hourTable tr.hourTableHeaderRow th.hourTableHeaderPhase {
      width: 4em;
      padding: 2px 4px;
      background: #eee;
      border: 1px solid var(--border);
    }
    .inputPanePlan table.hourTable tr.hourTableRow td {
      border: 1px solid var(--border);
      padding: 0px;
      text-align: right;
    }
    .inputPanePlan table.hourTable tr.hourTableRow td input {
      width: 100%;
      box-sizing: border-box;
      font-size: 12px;
    }
    .inputPanePlan table.hourTable td.hourTableLabel {
      background: #eee;
      border: 1px solid var(--border);
      padding: 4px !important;
    }
    .inputPanePlan .planRowH label:has(.commentTextarea) {
      width: 100%;
    }
    .inputPanePlan .commentTextarea {
      width: 100%;
      box-sizing: border-box;
    }

    .dateTable {
      border-collapse: collapse;
      table-layout: fixed;
    }
    .dateTable th, .dateTable td {
      border: 1px solid var(--border);
      padding: 1px;
      text-align: left;
    }
    .dateTable th {
      background: #eee;
      font-weight: bold;
    }
    .dateTable .dateTableHeader {
      text-align: center;
      border: 1px solid var(--border);
      padding: 2px 4px;
      background: #eee;
      font-weight: bold;
    }
    .dateTable th.dateTableHeader {
      width: 5em;
    }
    .dateTable td.dateTableHeader {
      width: 3em;
    }
    .dateTable td input[type="date"] {
      width: 8em;
      box-sizing: border-box;
      font-size: 12px;
    }

    #resizer {
      flex: 0 0 6px; cursor: col-resize; background: #e0e0e0; border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    #resizer.hidden {
      display: none;
    }
    #rightWrap { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    #ganttVScroll { flex: 1 1 auto; overflow: auto; min-height: 0; }
    .ganttStage { position: relative; width: max-content; min-width: 100%; }
    .commentLayer {
      position: absolute; left: 0; top: 0; pointer-events: none;
      z-index: var(--z-index-comment);
    }
    .commentLineLayer {
      position: absolute; left: 0; top: 0; pointer-events: none;
      z-index: var(--z-index-comment-line);
    }
    .commentCard {
      position: absolute; min-width: 160px; max-width: 220px; padding: 4px 6px;
      background: #fffef3; border: 1px solid #d7cfa2; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      font-size: 11px; white-space: pre-wrap; word-break: break-word; cursor: move; pointer-events: auto;
    }
    .nodeCommentCard {
      position: sticky; min-width: 160px; max-width: 220px; padding: 4px 6px;
      background: #fffef3; border: 1px solid #d7cfa2; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      font-size: 11px; white-space: pre-wrap; word-break: break-word; cursor: move; pointer-events: auto;
    }

    table.gantt {
      border-collapse: collapse; table-layout: fixed;
    }
    table.gantt th {
      padding: 2px 4px; vertical-align: middle;
    }
    table.gantt td {
      border: 1px solid var(--border);
      padding: 2px 4px;
      vertical-align: middle;
    }

    table.gantt thead {
      position: sticky;
      top: 0;
      z-index: var(--z-index-header);
    }
    table.gantt thead th,
    table.gantt thead td {
      position: sticky;
      z-index: var(--z-index-header);
      border-color: transparent;
    }
    table.gantt thead th::before,
    table.gantt thead td::before {
      content: "";
      position: absolute;
      inset: -1px -1px 0 0;
      background: inherit;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      pointer-events: none;
      z-index: -1;
    }
    table.gantt thead tr:first-child th::before {
      border-top: 1px solid var(--border);
    }
    table.gantt thead th:first-child::before {
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calYear th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calMonth th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calDay th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead tr.calWeek th {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    table.gantt thead th.dayHead {
      width: 28px;
      height: var(--cal-head-row-h);
      font-size: 10px;
      line-height: 1.1;
      text-align: center;
      background: #eaeaea;
      font-weight: 500;
      padding: 1px 0;
      position: relative;
    }
    table.gantt thead tr.calDay th.dayHead .milestoneDot {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      transform: rotate(45deg);
      background: #ff9800;
      cursor: pointer;
    }
    table.gantt thead tr.calYear th.dayHead,
    table.gantt thead tr.calMonth th.dayHead {
      text-align: left;
      padding-left: 0;
    }
    .calStickyLabel {
      position: sticky;
      left: calc(var(--tree-head1-w) + var(--tree-head2-w));
      display: inline-block;
      padding-left: 6px;
      white-space: nowrap;
      z-index: var(--z-index-header-calendar) !important;
    }
  
    table.gantt thead tr.calYear th.calendarHead {
      position: sticky;
      left: 0;
      background: #eee;
      z-index: var(--z-index-header-caption) !important;
      padding: 0;
    }
    table.gantt thead .manhoursRow th.manhoursHead {
      position: sticky;
      left: 0;
      z-index: var(--z-index-header-caption) !important;
      font-weight: bold;
      text-align: left;
    }
    .manhoursRow td.manhourCell {
      background: #f5f5f5;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      height: var(--cal-head-row-h);
      
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    .manhoursHeader th.manhoursHead {
      background: var(--bg-header);
      border-left: 1px solid var(--border);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      z-index: var(--z-index-header-caption) !important;
    }
    .manhoursHeader td.manhourCell {
      background: var(--bg-header) !important;
      border-color: var(--bg-header) !important;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .manhoursCaseDetailRow th.manhoursHead {
      background: #e4d7bf;
      border-left: 1px solid var(--border);
      z-index: var(--z-index-header-caption) !important;
      cursor: pointer;
    }
    .manhoursCaseDetailRow td.manhourCell {
      background: #e4d7bf !important;
      height: var(--cal-head-row-h);
    }
    .manhoursDomainDetailRow th.manhoursHead {
      background: #d7e4bf;
      border-left: 1px solid var(--border);
      z-index: var(--z-index-header-caption) !important;
      cursor: pointer;
    }
    .manhoursDomainDetailRow td.manhourCell {
      background: #d7e4bf;
      height: var(--cal-head-row-h);
    }
    .manhoursMemberDetailRow th.manhoursHead {
      background: #bfd7e4;
      border-left: 1px solid var(--border);
      z-index: var(--z-index-header-caption) !important;
    }
    .manhoursMemberDetailRow td.manhourCell {
      background: #bfd7e4 !important;
      height: var(--cal-head-row-h);
    }

    table.gantt tbody {
      margin: 0; padding: 0;
    }

    .daycell {
      width: 28px;
      padding: 0 !important;
      text-align: center;
      font-size: 12px;
      vertical-align: top;
    }
    .daycell.dark {
      background: var(--bg-darkcol); color: #bbb;
    }
    .daycell .fill {
      display: block;
      height: 100%;
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 0;

      color: #111;
      /* min-height: 18px; */
      /* line-height: 20px; */
    }

    .dpvRow td {
      width: 28px;
      height: 22px;
      padding: 0;
      height: 25px;
      border: none !important;
      position: relative;
    }
    .dpvRow td.treeHead {
      position: sticky;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .dpvRow td span.commentDot {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #b0293a;
    }
    .dpv-domain td { background: var(--bg-domain); border-color: var(--bg-domain); color: var(--color-domain); }
    .dpv-project td { background: var(--bg-project); border-color: var(--bg-project); color: var(--color-project); }
    .dpv-version td { background: var(--bg-version); border-color: var(--bg-version); color: var(--color-version); }
    
    .treeHead {
      width: var(--tree-head1-w); background: #eee; position: sticky; left: 0;
      z-index: var(--z-index-body-caption) !important;
      border-color: inherit;
    }
    .treeHead2 {
      width: var(--tree-head2-w); background: #eee; position: sticky; left: var(--tree-head1-w);
      z-index: var(--z-index-body-caption) !important;
      border-color: inherit;
    }

    table.gantt tbody tr.planRow td.daycell,
    table.gantt tbody tr.actualRow td.daycell {
      position: relative;
    }
    table.gantt tbody tr.planRow.isPlanning {
      height: 14px;
    }
    table.gantt tbody tr.actualRow.isPlanning {
      height: 14px;
    }
    table.gantt tbody tr.planRow.isActual {
      height: 18px;
    }
    table.gantt tbody tr.actualRow.isActual {
      height: 18px;
    }

    .planRow th,
    .planRow td,
    .actualRow th,
    .actualRow td {
      position: sticky;
      z-index: var(--z-index-body);
      border-color: transparent !important;

      & .commentDot {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #b0293a;
      }
    }
    .planRow th::before,
    .planRow td::before,
    .actualRow th::before,
    .actualRow td::before {
      content: "";
      position: absolute;
      inset: -1px -1px 0 0;
      background: inherit;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      pointer-events: none;
      z-index: -1;
    }

    .planRow.isPlanning.selected td.daycell {
      box-shadow: inset 0 2px 0 var(--accent), inset 0 -3px 0 var(--accent);
    }
    .planRow.isActual.selected td.daycell {
      box-shadow: inset 0 2px 0 var(--accent);
    }
    .actualRow.isActual.selected td.daycell {
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    .nameCell { cursor: pointer; }
    .nameCell textarea  {
      field-sizing: content;
      box-sizing: border-box;
    }
    .planRow.selected td.treeHead,
    .planRow.selected td.treeHead2 {
      background: var(--selected);
    }

    .muted { color: #666; font-size: 11px; }
    button { cursor: pointer; }
    .treeRow { background: #fff; }
    .indent { padding-left: 6px; }
    .planRowH { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px 8px; }
    .planRowH label { display: flex; flex-direction: column; gap: 1px; font-size: 10px; white-space: nowrap; }
    .planRowH input[type="number"] {
      font-size: 11px;
      max-width: 4.5em;
    }
    .planRowH input[type="color"] {
      max-width: 2em;
    }
    .planRowH select {
      font-size: 11px;
      max-width: 9em;
    }
    .saveBar { display: flex; align-items: center; gap: 8px; }

    .actionBar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      width: 140px;
      min-width: 140px;
    }
    .actionBar button {
      width: 100%;
      text-align: left;
      word-break: break-all;
      word-wrap: break-word;
    }

    .ganttToolBox {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      max-width: 100%;
      margin: 0;
      padding: 4px;

      & .ganttToolSaveBlock {
        display: flex;
        flex-direction: row;
        gap: 6px;
        align-items: center;
        margin-right: 8px;

        & #ganttToolSaveStatus {
          text-wrap: nowrap;
        }
      }
    }
    .ganttToolBox button {
      width: auto;
      text-align: left;
      white-space: nowrap;
      font-size: 12px;
    }
  </style>
</head>

      <div id="leftPane"></div>
      <div id="resizer"></div>
      <div id="rightWrap">
        <div id="ganttVScroll"></div>
      </div>
    </div>
  </div>

(function () {
  function toDateString(date) {

  const dayKindNotTarget = null;

      const cap = capacityForDate(plan, ds, state);
      if (cap > 0) {

  function totalManhoursByCaseDomainMember(state, dates) {
    // date/case/domain/memberの階層で人工集計

      state.data.domains.forEach((dom) => {
        (dom.projects || []).forEach((pr) => {
          (pr.versions || []).forEach((vr) => {

  function refreshManhoursRowsDomOld() {

  function getDateRange(state) {

    };
    eachPlan(state, (pl) => {
      Object.keys(pl.cells || {}).forEach((ds) => {
        if (!cellIsOn(pl, ds, cellKindPlan)) return;
        bump(ds);
      });
      Object.keys(pl.actualCells || {}).forEach((ds) => {
        if (!cellIsOn(pl, ds, cellKindActual)) return;
        bump(ds);
      });
    });
    if (!minD || !maxD) {
      const today = toDateString(new Date());
      minD = addDays(today, -14);
      maxD = addDays(today, 14);
    } else {
      minD = addDays(minD, -14);
      maxD = addDays(maxD, 14);
    }
    const out = [];
    let cur = parseYMD(minD);
    const end = parseYMD(maxD);
    while (cur <= end) {
      out.push(toDateString(cur));
      cur.setDate(cur.getDate() + 1);
    }
    return out;
  }

  function shouldRefreshGanttNearRangeEdge(plan, dates, cellsOverride) {
    if (!plan || !Array.isArray(dates) || dates.length === 0) return false;
    const minDate = dates[0];
    const maxDate = dates[dates.length - 1];
    const cells = cellsOverride || plan.cells || {};
    const keys = Object.keys(cells);
    for (let i = 0; i < keys.length; i++) {
      const ds = keys[i];
      const c = cells[ds];
      if (!c || typeof c !== "object" || c.util == null) continue;
      const dMin = Math.abs(daysBetween(ds, minDate));
      const dMax = Math.abs(daysBetween(ds, maxDate));
      if (dMin <= 7 || dMax <= 7) return true;
    }
    return false;
  }

    bClose.addEventListener("click", closePopup);

      if (!commentPopupTarget) return;
      // Check if this is a milestone comment
      if (typeof commentPopupTarget === "string" && commentPopupTarget.match(/^\d{4}-\d{2}-\d{2}$/)) {
        // Milestone mode
        const dateVal = commentPopupTarget;
        if (!state.data.milestones) state.data.milestones = {};
        if (!state.data.milestones[dateVal]) state.data.milestones[dateVal] = { text: "" };
        state.data.milestones[dateVal].text = ta.value.trim();
      } else if (commentPopupDate) {
        // Cell mode
        setCellComment(commentPopupTarget, commentPopupDate, ta.value);
      } else {
        // Node mode: plan, task などを対象に comment を設定
        setNodeComment(commentPopupTarget, ta.value);
        // plan のコメント変更時、左入力ペインの textarea を直接更新
        if (commentPopupTarget.plans === undefined) {

      markDirty(state, true);
      closePopup();
      renderAll();
    });
    bDel.addEventListener("click", () => {
      if (!commentPopupTarget) return;
      // Check if this is a milestone comment
      if (typeof commentPopupTarget === "string" && commentPopupTarget.match(/^\d{4}-\d{2}-\d{2}$/)) {
        // Milestone mode
        const dateVal = commentPopupTarget;
        if (state.data.milestones && state.data.milestones[dateVal]) {
          delete state.data.milestones[dateVal];
        }
      } else if (commentPopupDate) {
        // Cell mode
        setCellComment(commentPopupTarget, commentPopupDate, "");
      } else {
        // Node mode
        setNodeComment(commentPopupTarget, "");
      }
      markDirty(state, true);
      closePopup();
      renderAll();
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && pop.style.display !== "none") closePopup();
    });
    window.addEventListener("mousedown", (e) => {
      if (pop.style.display === "none") return;
      if (e.target === pop || pop.contains(e.target)) return;
      closePopup();
    });
    commentPopup = pop;
    commentPopupText = ta;
    commentPopupMeta = meta;
  }

  function startEditLabel(span, onCommit) {
    const t = span.textContent;
    const inp = document.createElement("textarea");
    inp.className = "editLabelInput";
    //inp.type = "text";
    inp.value = t;
    span.replaceWith(inp);
    inp.focus();
    inp.select();
    let cancel = false;
    function done() {
      if (!cancel) {
        if (span.textContent === inp.value) {
          cancel = true;
        } else {
          span.textContent = inp.value;
        }
      }
      inp.replaceWith(span);
      onCommit(inp.value, cancel);
      // renderAll();
    }
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === "Escape") {
        if (e.key === "Escape") cancel = true;
        e.preventDefault();
        inp.blur();
      }
    });
    inp.addEventListener("blur", done);
  }

  function renderInputPane() {
    leftPane.innerHTML = "";
    const d = state.data;
    const createDefaultPlan = () => {
      const pl = {
        id: uid(),
        name: "新しい plan",
        isPlanOrActual: cellKindPlan,
        plannedStart: toDateString(new Date()),
        plannedEnd: "",
        actualStart: "",
        actualEnd: "",
        utilization: 1,
        caseId: d.cases[0] && d.cases[0].id || null,
        ownerId: d.members[0] && d.members[0].id || null,
        color: null,
        statusId: d.statuses[0] && d.statuses[0].id || null,
        phaseHours: {},
        cells: {},
        actualCells: {},
        comment: {},
      };
      d.phases.forEach((ph) => { pl.phaseHours[ph] = { planned: 0, actual: 0 }; });
      return pl;
    };

    const addBtn = (label, fn) => {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = label;
      b.addEventListener("click", fn);
      return b;
    };
    const addDeleteBtn = (fn) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "deleteBtn";
      b.textContent = "✕";
      b.addEventListener("click", fn);
      return b;
    }

    const moveItem = (arr, item, direction) => {
      if (!Array.isArray(arr) || !item) return false;
      const idx = arr.indexOf(item);
      if (idx < 0) return false;
      const next = idx + direction;
      if (next < 0 || next >= arr.length) return false;
      const tmp = arr[next];
      arr[next] = arr[idx];
      arr[idx] = tmp;
      return true;
    };
    const addMoveBtns = (toolEl, arr, item, tgtElem) => {
      toolEl.appendChild(addBtn("↑", () => {
        if (!moveItem(arr, item, -1)) return;
        const swap = tgtElem.previousElementSibling;
        if (swap) tgtElem.parentNode.insertBefore(tgtElem, swap);
        markDirty(state, true);
        renderGantt();
      }));
      toolEl.appendChild(addBtn("↓", () => {
        if (!moveItem(arr, item, +1)) return;
        const swap = tgtElem.nextElementSibling;
        if (swap) tgtElem.parentNode.insertBefore(swap, tgtElem);
        markDirty(state, true);
        renderGantt();
      }));
    };

    const makeDomainNode = (dom) => {
      const domEl = document.createElement("div");
      domEl.className = "inputPaneDomain";
      domEl.dataset.id = dom.id;

      dh.className = "inputPaneHeader inputPaneDomainHeader";

      ds.className = "nameCell";

          renderGantt();

      title.appendChild(ds);

      tool.appendChild(addBtn("+ project", () => {

        renderGantt();

    const makeTaskNode = (vr, tk) => {
      const te = document.createElement("div");

    const makePlanNode = (tk, pl) => {

      // 削除ボタン

      // element構築

      ph.appendChild(tool);

      };
      box.addEventListener("focusin", selectPlanInLeftPane);
      box.addEventListener("click", selectPlanInLeftPane);

      function addMiniRow() {
        const row = document.createElement("div");
        row.className = "planRowH";
        fields.appendChild(row);

      }
      function addLabeled(row, label, el) {
        const lab = document.createElement("label");
        lab.innerHTML = "<span>" + label + "</span>";
        lab.appendChild(el);
        row.appendChild(lab);
      }

      // table定義
      const rowHour = addMiniRow();

      // 開始日と終了日をまとめたテーブル
      {
        // 終了日dom更新ハンドラ
        const updatePlannedEndDom = () => {
          const inp = fields.querySelector('input[data-field="plannedEnd"]');
          if (inp) inp.value = pl.plannedEnd || "";
        };
        const dateTable = document.createElement("table");
        dateTable.className = "dateTable";
        // ヘッダー行
        const headerRow = document.createElement("tr");
        const headerLabel = document.createElement("th");
        headerRow.appendChild(headerLabel);
        const startHeader = document.createElement("th");
        startHeader.className = "dateTableHeader";
        startHeader.textContent = "開始日";
        headerRow.appendChild(startHeader);
        const endHeader = document.createElement("th");
        endHeader.className = "dateTableHeader";
        endHeader.textContent = "終了日";
        headerRow.appendChild(endHeader);
        dateTable.appendChild(headerRow);
        // 予定行

        const plannedLabel = document.createElement("td");
        plannedLabel.className = "dateTableHeader";

        const inpStart = document.createElement("input");
        inpStart.type = "date";
        inpStart.readOnly = true;   // 現状、直接入力はさせない。ガントのセルから入力する想定。
        inpStart.dataset.field = "plannedStart";
        inpStart.value = pl.plannedStart || "";
        inpStart.addEventListener("change", () => {
          pl.plannedStart = inpStart.value;
          pl.plannedEnd = computePlannedEnd(pl, state);
          updatePlannedEndDom();
          markDirty(state, true);
          renderGantt();
        });
        plannedStartCell.appendChild(inpStart);
        plannedRow.appendChild(plannedStartCell);
        const plannedEndCell = document.createElement("td");
        const inpEnd = document.createElement("input");
        inpEnd.type = "date";
        inpEnd.readOnly = true;
        inpEnd.dataset.field = "plannedEnd";
        inpEnd.value = pl.plannedEnd || "";
        plannedEndCell.appendChild(inpEnd);
        plannedRow.appendChild(plannedEndCell);
        dateTable.appendChild(plannedRow);
        // 実績行

        const actualLabel = document.createElement("td");

        const aS = document.createElement("input");

        actualStartCell.appendChild(aS);

        const actualEndCell = document.createElement("td");
        const aE = document.createElement("input");

      // 予定工数行の作成
      const plannedRow = document.createElement("tr");
      plannedRow.className = "hourTableRow";
      const plannedLabel = document.createElement("td");
      plannedLabel.textContent = "予定";
      plannedLabel.className = "hourTableLabel";
      plannedRow.appendChild(plannedLabel);
      // 実績工数行の作成
      const actualRow = document.createElement("tr");
      actualRow.className = "hourTableRow";

      actualRow.appendChild(actualLabel);

            markDirty(state, true);

        tdP.appendChild(inpP);
        plannedRow.appendChild(tdP);
        // 実績工数行に入力欄を追加

        inpA.type = "text";
        inpA.value = String((pl.phaseHours[ph] && pl.phaseHours[ph].actual) || 0);
        if (ph === "all") {
          inpA.readOnly = true;
          inpA.dataset.field = "phaseActualAll";
          inpA.title = "ガントのセル入力から集計（チャート反映）";

          inpA.addEventListener("change", () => {
            syncPhaseTotalsFromField(state, pl, ph, "actual", inpA.value);
            markDirty(state, true);
          });

        tdA.appendChild(inpA);
        actualRow.appendChild(tdA);
      });
      // tableに行を追加
      hourTable.appendChild(headerRow);
      hourTable.appendChild(plannedRow);

      rowHour.appendChild(hourTable);


      const rowSelect = addMiniRow();
      const inpUtil = document.createElement("input");
      inpUtil.type = "number";
      inpUtil.step = "0.1";
      inpUtil.min = "0.1";
      inpUtil.value = pl.utilization;
      inpUtil.addEventListener("change", () => {
        const nextUtil = Number(inpUtil.value) || 1;
        pl.utilization = nextUtil;
        Object.keys(pl.cells || {}).forEach((ds) => {
          const cell = pl.cells[ds];
          if (!cell || typeof cell !== "object") return;
          const utilObj = cell.util;
          if (!utilObj || typeof utilObj !== "object") return;
          if (!Object.prototype.hasOwnProperty.call(utilObj, "value")) return;
          const explicit = Number(utilObj.value);
          if (!Number.isFinite(explicit)) return;
          if (Math.abs(explicit - nextUtil) <= 1e-5) {
            delete utilObj.value;
          }
        });
        Object.keys(pl.actualCells || {}).forEach((ds) => {
          const cell = pl.actualCells[ds];
          if (!cell || typeof cell !== "object") return;
          const utilObj = cell.util;
          if (!utilObj || typeof utilObj !== "object") return;
          if (!Object.prototype.hasOwnProperty.call(utilObj, "value")) return;
          const explicit = Number(utilObj.value);
          if (!Number.isFinite(explicit)) return;
          if (Math.abs(explicit - nextUtil) <= 1e-5) {

      addLabeled(rowSelect, "稼働率", inpUtil);
      // case選択

          markDirty(state, true);
          renderAll();
        }
      });
      addLabeled(rowSelect, "owner", selOwn);
      const colPick = document.createElement("input");
      colPick.type = "color";

    // domain / project / version / taskのツリー構造
    d.domains.forEach((dom) => {
      // domain要素

        (pr.versions || []).forEach((vr) => {
          // version要素

          (vr.tasks || []).forEach((tk) => {

  function calcTreeSticky() {
    return;

    // ツール全体コンテナの高さを取得
    const inputPaneTool = leftPane.querySelector(".inputPaneToolHeader");
    const inpPaneHeaderH = inputPaneTool ? inputPaneTool.getBoundingClientRect().height : 0;
    // domain要素
    const domains = leftPane.querySelectorAll(".inputPaneDomain");
    domains.forEach((dom) => {
      const domHeader = dom.querySelector(".inputPaneDomainHeader");
      domHeader.style.top = inpPaneHeaderH + "px";
      const offsetProject = inpPaneHeaderH + domHeader.getBoundingClientRect().height;

      // project要素
      const projects = dom.querySelectorAll(".inputPaneProject");
      projects.forEach((pr) => {
        const prHeader = pr.querySelector(".inputPaneProjectHeader");
        const offsetVersion = offsetProject + prHeader.getBoundingClientRect().height;
        prHeader.style.top = offsetProject + "px";

        // version要素
        const versions = pr.querySelectorAll(".inputPaneVersion");
        versions.forEach((vr) => {
          const vrHeader = vr.querySelector(".inputPaneVersionHeader");
          const offsetTask = offsetVersion + vrHeader.getBoundingClientRect().height;
          vrHeader.style.top = offsetVersion + "px";

          // task要素
          const tasks = vr.querySelectorAll(".inputPaneTask");
          tasks.forEach((tk) => {
            const tkHeader = tk.querySelector(".inputPaneTaskHeader");
            tkHeader.style.top = offsetTask + "px";
          });
        });
      });
    });
  }

  function validateCaseOwner(task, plan) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    return !(task.plans || []).some((p) => p.id !== plan.id && (p.caseId || "") + "|" + (p.ownerId || "") === key);
  }

  function applyColorToCaseOwner(task, plan, color) {
    const key = (plan.caseId || "") + "|" + (plan.ownerId || "");
    (task.plans || []).forEach((p) => {
      if ((p.caseId || "") + "|" + (p.ownerId || "") === key) p.color = color;
    });
  }

  function planMatchesCaseFilter(pl) {
    if (!state.caseFilter || state.caseFilter.length === 0) return true;
    return state.caseFilter.includes(pl.caseId || "");
  }

  function caseMatchesCaseFilter(cs) {
    if (!state.caseFilter || state.caseFilter.length === 0) return true;
    return state.caseFilter.includes(cs.id || "");
  }

  function contiguousBlock(plan, dateStr, state, datesOverride, cellKind) {
    const dates = datesOverride || getDateRange(state);
    const idx = dates.indexOf(dateStr);
    if (idx < 0) return { start: dateStr, end: dateStr };
    let s = idx, e = idx;
    let li = s - 1;
    while (li >= 0) {
      if (cellIsOn(plan, dates[li], cellKind)) {
        s = li;
        li--;
        continue;
      }
      if (isHolidayDate(dates[li], plan, state)) {
        li--;
        continue;
      }
      break;
    }
    let ri = e + 1;
    while (ri < dates.length) {
      if (cellIsOn(plan, dates[ri], cellKind)) {
        e = ri;
        ri++;
        continue;
      }
      if (isHolidayDate(dates[ri], plan, state)) {
        ri++;
        continue;
      }
      break;
    }
    return { start: dates[s], end: dates[e], startIdx: s, endIdx: e };
  }

  const MOUSE_EV_MODE_CLICK = 1;
  const MOUSE_EV_MODE_MOVE = 2;
  const MOUSE_EV_MODE_RESIZE_LEFT = 3;
  const MOUSE_EV_MODE_RESIZE_RIGHT = 4;

  function planCellInteractionMode(pl, dateStr, localX, cellWidth, datesOverride, cellKind) {
    const blk = contiguousBlock(pl, dateStr, state, datesOverride, cellKind);
    if (!cellIsOn(pl, dateStr, cellKind)) return MOUSE_EV_MODE_CLICK;
    if (dateStr === blk.start && localX < PLAN_CELL_EDGE_PX) return MOUSE_EV_MODE_RESIZE_LEFT;
    if (dateStr === blk.end && localX > cellWidth - PLAN_CELL_EDGE_PX) return MOUSE_EV_MODE_RESIZE_RIGHT;
    return MOUSE_EV_MODE_MOVE;
  }

  function cursorForPlanCellMode(mode) {
    if (mode === MOUSE_EV_MODE_RESIZE_LEFT || mode === MOUSE_EV_MODE_RESIZE_RIGHT) return "ew-resize";
    if (mode === MOUSE_EV_MODE_MOVE) return "move";
    return "";
  }

  function clearInputCell(cells, ds) {
    const c = cells[ds];
    if (!c || typeof c !== "object" || c === true) {
      delete cells[ds];
      return;
    }
    delete c.util;
    if (!c.comment || !String(c.comment.text || "").trim()) {
      delete cells[ds];
      return;
    }
    cells[ds] = c;
  }

  function shiftIndexByBusinessDays(dates, startIdx, step, plan, state) {
    if (step === 0) return startIdx;
    let idx = startIdx;
    let remain = Math.abs(step);
    const dir = step > 0 ? 1 : -1;
    while (remain > 0) {
      idx += dir;
      if (idx < 0 || idx >= dates.length) return -1;
      if (!isHolidayDate(dates[idx], plan, state)) remain--;
    }
    return idx;
  }

  const WD_JP = ["日", "月", "火", "水", "木", "金", "土"];

  function weekdayJp(ymd) {
    const d = parseYMD(ymd);
    return d ? WD_JP[d.getDay()] : "";
  }

  function computeTreeHead2WidthPx() {
    const labels = ["—"];
    state.data.domains.forEach((dom) => {
      //labels.push(dom.name || "");
      (dom.projects || []).forEach((pr) => {
        //labels.push(pr.name || "");
        (pr.versions || []).forEach((vr) => {
          //labels.push(vr.name || "");
          (vr.tasks || []).forEach((tk) => {
            (tk.plans || []).forEach((pl) => labels.push(pl.name || ""));
          });
        });
      });
    });
    const minsize = 100;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    if (!ctx) return minsize;
    ctx.font = "11px " + getComputedStyle(document.documentElement).getPropertyValue("--font").trim();
    let maxW = 0;
    labels.forEach((txt) => {
      const w = ctx.measureText(String(txt)).width;
      if (w > maxW) maxW = w;
    });
    return Math.max(minsize, Math.ceil(maxW) + 15);
  }

  function renderGantt(datesOverride) {
    const dates = datesOverride || getDateRange(state);
    const commentRefs = [];
    const tbl = document.createElement("table");
    tbl.className = "gantt";
    const treeHead2W = computeTreeHead2WidthPx();
    tbl.style.setProperty("--tree-head2-w", treeHead2W + "px");
    const colgroup = document.createElement("colgroup");
    colgroup.innerHTML = '<col class="treeHead" style="width:var(--tree-head1-w)" /><col class="treeHead2" style="width:' + treeHead2W + 'px" />' +
      dates.map(() => '<col style="width:28px" />').join("");
    tbl.appendChild(colgroup);
    const thead = document.createElement("thead");
    const tbody = document.createElement("tbody");
    tbl.appendChild(thead);
    tbl.appendChild(tbody);

    function addDayHeaderRow(rowClass, textFn, bgFn) {
      const tr = document.createElement("tr");
      tr.className = rowClass;
      // const th1 = document.createElement("th");
      // th1.className = "treeHead";
      // th1.colSpan = 2;
      // tr.appendChild(th1);
      dates.forEach((ds) => {
        const th = document.createElement("th");
        th.className = "dayHead";
        th.textContent = textFn(ds);
        if (bgFn) th.style.background = bgFn(ds) || "";
        if (rowClass === "calDay") {
          if (ds === state.today) {
            th.classList.add("today");
          }
          // マイルストーン情報の確認
          if (state.data.milestones && state.data.milestones[ds]) {
            const key = "milestone:" + ds + ":";
            const dot = document.createElement("span");
            dot.className = "milestoneDot";
            dot.title = "マイルストーン";
            dot.dataset.commentRef = key;
            th.appendChild(dot);
            commentRefs.push({ key, kind: "milestone", label: "マイルストーン", target: ds, date: ds, dot });
            
            // コメント表示イベント
            const onCommentClick = (e) => {
              e.preventDefault();
              e.stopPropagation();
              openCommentPopup(ds, null, "マイルストーン: " + ds, th, key);
            };
            // ドットのクリック時処理
            dot.addEventListener("click", onCommentClick);
            th.addEventListener("contextmenu", onCommentClick);
          }
        }
        
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    function addGroupedHeaderRow(rowClass, textFn, bgFn) {
      const tr = document.createElement("tr");
      tr.className = rowClass;
      if (rowClass === "calYear") {
        const th1 = document.createElement("th");
        th1.className = "calendarHead";
        th1.rowSpan = 4;
        th1.colSpan = 2;

        // 各種ツールボタン作成
        const toolBox = document.createElement("div");
        toolBox.className = "ganttToolBox";
        // 保存ボタン
        const saveBlock = document.createElement("div");
        saveBlock.className = "ganttToolSaveBlock";
        const bSave = document.createElement("button");
        bSave.type = "button";
        bSave.textContent = "保存 (Ctrl+S)";
        bSave.addEventListener("click", () => { saveData(); });
        const span = document.createElement("span");
        span.id = "ganttToolSaveStatus";
        span.className = "muted";
        span.textContent = state.dirty ? "変更あり" : "変更なし";
        state.toolSaveStatus = span;
        // updateToolSaveStatus();
        saveBlock.appendChild(bSave);
        saveBlock.appendChild(span);

        // コメント表示モード切替ボタン
        const bCommentMode = document.createElement("button");
        bCommentMode.type = "button";
        bCommentMode.textContent = state.commentDisplayMode === "always"
          ? "コメント: 常時表示"
          : "コメント: 右クリック時";
        bCommentMode.addEventListener("click", () => {
          state.commentDisplayMode = state.commentDisplayMode === "always" ? "context" : "always";
          if (state.commentDisplayMode === "always") state.commentContextKey = null;
          // renderAll();
          renderGantt();
        });

        // 左ペイン:情報入力パネル表示切替ボタン
        const bLeftPaneToggle = document.createElement("button");
        bLeftPaneToggle.type = "button";
        bLeftPaneToggle.textContent = state.inputPaneVisible ? "Close:左パネル" : "Open:左パネル";
        bLeftPaneToggle.addEventListener("click", () => {
          state.inputPaneVisible = !state.inputPaneVisible;
          leftPane.classList.toggle("hidden", !state.inputPaneVisible);
          resizer.classList.toggle("hidden", !state.inputPaneVisible);
          bLeftPaneToggle.textContent = state.inputPaneVisible ? "Close:左パネル" : "Open:左パネル";
        });

        // 上ペイン:データ入力パネル表示切替ボタン
        const bTopPaneToggle = document.createElement("button");
        bTopPaneToggle.type = "button";
        bTopPaneToggle.textContent = state.topPaneVisible ? "Close:上パネル" : "Open:上パネル";
        bTopPaneToggle.addEventListener("click", () => {
          state.topPaneVisible = !state.topPaneVisible;
          topPane.classList.toggle("hidden", !state.topPaneVisible);
          hResizer.classList.toggle("hidden", !state.topPaneVisible);
          bTopPaneToggle.textContent = state.topPaneVisible ? "Close:上パネル" : "Open:上パネル";
        });

        // 今日の位置を表示
        const bJumpToday = document.createElement("button");
        bJumpToday.type = "button";
        bJumpToday.textContent = "Jump:今日";
        bJumpToday.addEventListener("click", () => {
          const today = document.querySelector("table.gantt tr.calDay .today");
          scrollGanttToElem(today, { inline: "center" });
        });

        toolBox.appendChild(saveBlock);
        toolBox.appendChild(bCommentMode);
        toolBox.appendChild(bLeftPaneToggle);
        toolBox.appendChild(bTopPaneToggle);
        toolBox.appendChild(bJumpToday);
        th1.appendChild(toolBox);

        tr.appendChild(th1);
      }
      if (dates.length === 0) {
        thead.appendChild(tr);
        return;
      }
      let start = 0;
      while (start < dates.length) {
        const label = textFn(dates[start]);
        let end = start + 1;
        while (end < dates.length && textFn(dates[end]) === label) end++;
        const th = document.createElement("th");
        th.className = "dayHead";
        th.colSpan = end - start;
        if (rowClass === "calYear" || rowClass === "calMonth") {
          const txt = document.createElement("span");
          txt.className = "calStickyLabel";
          txt.textContent = label;
          th.appendChild(txt);
        } else {
          th.textContent = label;
        }
        if (bgFn) th.style.background = bgFn(dates[start]) || "";
        tr.appendChild(th);
        start = end;
      }
      thead.appendChild(tr);
    }

    addGroupedHeaderRow("calYear", (ds) => ds.slice(0, 4));
    addGroupedHeaderRow("calMonth", (ds) => ds.slice(5, 7));
    addDayHeaderRow("calDay", (ds) => ds.slice(8, 10), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state) || todayTypeForDate(ds, state)));
    addDayHeaderRow("calWeek", (ds) => weekdayJp(ds), (ds) => holidayBgColor(holidayTypeForHeaderDate(ds, state) || todayTypeForDate(ds, state)));

    // 人工数集計行を追加
    function createManhoursRow(label, filterFn, depth = 0) {
      const tr = document.createElement("tr");
      tr.className = "treeRow manhoursRow";
      const labelCell = document.createElement("th");
      labelCell.className = "manhoursHead";
      labelCell.colSpan = 2;
      labelCell.style.paddingLeft = (8 + depth * 10) + "px";
      labelCell.textContent = label;
      tr.appendChild(labelCell);
      
      dates.forEach((ds) => {
        const td = document.createElement("td");
        td.className = "manhourCell";
        td.dataset.date = ds;
        
        // 当日の総工数を計算
        let totalHours = 0;
        state.data.domains.forEach((dom) => {
          (dom.projects || []).forEach((pr) => {
            (pr.versions || []).forEach((vr) => {
              (vr.tasks || []).forEach((tk) => {
                (tk.plans || []).forEach((pl) => {
                  if (planMatchesCaseFilter(pl) && filterFn(pl, dom)) {
                    const hours = dayHoursAll(pl, ds);
                    totalHours += hours;
                  }
                });
              });
            });
          });
        });
        
        // 人工 = 工数 / 8hr
        const manHours = (totalHours / 8).toFixed(1);
        td.textContent = manHours;
        td.title = totalHours + "hr";
        tr.appendChild(td);
      });
      
      return tr;
    }

    // 総合人工行（クリック可能、集計行の表示非表示を切り替え）
    const totalManhoursRow = document.createElement("tr");
    totalManhoursRow.className = "treeRow manhoursRow manhoursHeader";
    const totalLabelCell = document.createElement("th");
    totalLabelCell.className = "manhoursHead";
    totalLabelCell.colSpan = 2;
    totalLabelCell.textContent = "総合人工 (" + (state.manhoursExpanded ? "▼" : "▶") + ")";
    totalManhoursRow.appendChild(totalLabelCell);
    
    //dates.forEach((ds) => {
      const td = document.createElement("td");
      td.className = "manhourCell";
      // td.dataset.date = ds;
      td.colSpan = dates.length;
      td.textContent = "";
      totalManhoursRow.appendChild(td);
    //});
    
    totalManhoursRow.addEventListener("click", () => {
      state.manhoursExpanded = !state.manhoursExpanded;
      renderGantt();
    });
    
    thead.appendChild(totalManhoursRow);

    // Case別の集計行
    state.data.cases.filter(caseMatchesCaseFilter).forEach((cse) => {
      // Case別総合行
      const isCaseExpanded = state.caseExpanded[cse.id] !== false;
      
      if (state.manhoursExpanded) {
        // case集計作成
        const caseRow = createManhoursRow("Case: " + cse.name + " (" + (isCaseExpanded ? "▼" : "▶") + ")", (pl) => pl.caseId === cse.id, 0);
        caseRow.className += " manhoursCaseDetailRow";
        caseRow.dataset.mhKind = "case";
        caseRow.dataset.caseId = cse.id;
        // Case行のラベルセルをクリック可能にする
        const caseLabelCell = caseRow.querySelector(".manhoursHead");
        if (caseLabelCell) {
          caseLabelCell.addEventListener("click", (e) => {
            e.stopPropagation();
            state.caseExpanded[cse.id] = !isCaseExpanded;
            renderGantt();
          });
        }
        thead.appendChild(caseRow);
        
        // Domain別の集計行
        state.data.domains.forEach((dom) => {
          const domRowKey = cse.id + "::" + dom.id;
          if (state.domainExpanded[domRowKey] == null) state.domainExpanded[domRowKey] = false; // 初期値は展開しない
          const isDomainExpanded = state.domainExpanded[domRowKey] !== false;
          
          // Domain行の表示制御：総合が展開 AND 該当Case行が展開
          if (isCaseExpanded) {
            const domRow = createManhoursRow(
              "  └ " + dom.name + " (" + (isDomainExpanded ? "▼" : "▶") + ")",
              (pl, d) => pl.caseId === cse.id && d.id === dom.id,
              1
            );
            domRow.className += " manhoursDomainDetailRow";
            domRow.dataset.mhKind = "domain";
            domRow.dataset.caseId = cse.id;
            domRow.dataset.domainId = dom.id;
            
            // Domain行のラベルセルをクリック可能にする
            const domLabelCell = domRow.querySelector(".manhoursHead");
            if (domLabelCell) {
              domLabelCell.addEventListener("click", (e) => {
                e.stopPropagation();
                state.domainExpanded[domRowKey] = !isDomainExpanded;
                renderGantt();
              });
            }
            
            thead.appendChild(domRow);
            
            // Member別の集計行
            state.data.members.forEach((mem) => {

              // Member行の表示制御：総合が展開 AND Case行が展開 AND Domain行が展開
              if (isDomainExpanded) {
                const memRow = createManhoursRow("    └ " + mem.name, (pl, d) => pl.caseId === cse.id && d.id === dom.id && pl.ownerId === mem.id, 2);
                memRow.className += " manhoursMemberDetailRow";
                memRow.dataset.mhKind = "member";
                memRow.dataset.caseId = cse.id;
                memRow.dataset.domainId = dom.id;
                memRow.dataset.memberId = mem.id;
                
                thead.appendChild(memRow);
              }
            });
          }
        });
      }
    });

    function addDPVRow(label, target, kind) {
      const tr = document.createElement("tr");
      tr.className = "treeRow dpvRow dpv-" + kind;
      const tdLabel = document.createElement("td");
      tdLabel.colSpan = 2;
      tdLabel.className = "treeHead";
      tdLabel.textContent = label;
      tdLabel.addEventListener("click", () => {
        const selector = kind === "domain" ? "[data-id='" + target.id + "'].inputPaneDomain" :
                         kind === "project" ? "[data-id='" + target.id + "'].inputPaneProject" :
                         kind === "version" ? "[data-id='" + target.id + "'].inputPaneVersion" : null;
        if (selector) {
          const el = leftPane.querySelector(selector);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        }
      });
      tr.appendChild(tdLabel);
      dates.forEach(() => {
        const c = document.createElement("td");
        tr.appendChild(c);
      });
      const startIdx = 1;
      dates.forEach((ds, i) => {
        const key = commentRefKey(kind, target, ds);
        const c = tr.children[startIdx + i];

        if (getCellComment(target, ds).trim()) {
          const dot = document.createElement("span");
          dot.className = "commentDot";
          dot.dataset.commentRef = key;
          c.appendChild(dot);
          commentRefs.push({ key, kind, label, target, date: ds, dot });
        }
        c.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCommentPopup(target, ds, kind + ":" + label, c, key);
        });
      });
      tbody.appendChild(tr);
    }

    function appendPlanDayCells(tr_plan, tr_act, dom, pr, vr, pl, isPlanMode) {
      dates.forEach((ds) => {
        const key = commentRefKey("plan", pl, ds);
        const td_plan = document.createElement("td");
        td_plan.className = "daycell";
        const td_act = document.createElement("td");
        td_act.className = "daycell";

        const makeFill = (cellKind, td) => {
          const hrs = dayHoursAll(pl, ds, cellKind);
          const base = planBarColor(pl, state);
          const holType = holidayTypeForDate(ds, pl, state) || todayTypeForDate(ds, state);
          const fill = document.createElement("span");
          fill.className = "fill";
          if (hrs > 0) {
            td.style.background = base;
            fill.style.background = "transparent";
          } else {
            td.style.background = holidayBgColor(holType) || "";
            fill.style.background = "";
          }
          const uShow = cellIsOn(pl, ds, cellKind) && Math.abs(effectiveCellUtil(pl, ds, cellKind) - (pl.utilization || 1)) > 1e-5;
          fill.textContent = uShow ? String(effectiveCellUtil(pl, ds, cellKind)) : "";

          return fill;
        };
        const fillPlan = makeFill(cellKindPlan, td_plan);
        td_plan.appendChild(fillPlan);

        td_plan.dataset.date = ds;
        td_plan.dataset.planId = pl.id;
        td_plan.dataset.cellKind = "plan";

        if (isPlanMode) {
          // Planモード
          td_plan.rowSpan = 2;
        } else {
          // Actualモード
          td_act.dataset.date = ds;
          td_act.dataset.planId = pl.id;
          td_act.dataset.cellKind = "actual";
          const fillAct = makeFill(cellKindActual, td_act);
          td_act.appendChild(fillAct);
        }

        if (getCellComment(pl, ds).trim()) {
          const dot = document.createElement("span");
          dot.className = "commentDot";
          dot.dataset.commentRef = key;
          td_plan.appendChild(dot);
          commentRefs.push({ key, kind: "plan", label: pl.name, target: pl, date: ds, dot });
        }

        const bindEditEvents = (td, cellKind, editable) => {
          if (!editable) {
            td.style.cursor = "default";
            return;
          }
          td.addEventListener("mousemove", (e) => {
            const r = td.getBoundingClientRect();
            const localX = e.clientX - r.left;
            const m = planCellInteractionMode(pl, ds, localX, r.width, dates, cellKind);
            td.style.cursor = cursorForPlanCellMode(m) || "cell";
          });
          td.addEventListener("mouseleave", () => {
            td.style.cursor = "";
          });
          td.addEventListener("pointerdown", (e) => onCellPointerDown(e, pl, ds, dates, cellKind));
        };

        td_plan.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCommentPopup(pl, ds, "plan:" + pl.name, td_plan, key);
        });

        bindEditEvents(td_plan, cellKindPlan, !!pl.isPlanOrActual);
        tr_plan.appendChild(td_plan);
        if (isPlanMode) {
          // Planモード
        } else {
          // Actualモード
          bindEditEvents(td_act, cellKindActual, !pl.isPlanOrActual);
          tr_act.appendChild(td_act);
        }
      });
    }

            dot.style.cursor = "pointer";
            dot.title = "コメントあり";

          t2.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openCommentPopup(tk, null, "Task: " + tk.name, t2);
          });
          tr_plan.appendChild(t2);
        }
        const tPlan = document.createElement("td");
        tPlan.className = "treeHead2 nameCell";

        tPlan.rowSpan = 2;
        
        // Plan のコメント表示
        if (getNodeComment(pl).trim()) {
          const dot = document.createElement("span");
          dot.style.position = "absolute";
          dot.style.top = "2px";
          dot.style.right = "2px";
          dot.style.width = "5px";
          dot.style.height = "5px";
          dot.style.borderRadius = "50%";
          dot.style.background = "#b0293a";
          dot.style.cursor = "pointer";
          dot.title = "コメントあり";
          dot.addEventListener("click", (e) => {
            e.stopPropagation();
            openCommentPopup(pl, null, "Plan: " + pl.name, dot);
          });
          tPlan.appendChild(dot);
          //commentRefs.push({ key: null, kind: "plan", label: pl.name, target: pl, date: null, dot });
        }
        
        tPlan.addEventListener("click", () => {
          state.selectedPlanId = pl.id;
          applySelectedPlanDom(state.selectedPlanId);
          scrollLeftPlanIntoView(state.selectedPlanId);
        });
        tPlan.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCommentPopup(pl, null, "Plan: " + pl.name, tPlan);
        });

        // 表示モード作成:
        // pl.isPlanOrActual===true and pl.actualCellsが空 -> Planモード（1行表示、セルはplanデータ参照）
        // そうでない場合はActualモード（planとactualの2行表示、セルはそれぞれのデータ参照）
        const isPlanMode = pl.isPlanOrActual && (!pl.actualCells || Object.keys(pl.actualCells).length === 0);

        if (isPlanMode) {
          // Planモード
          tr_plan.classList.add("isPlanning");
          tr_act.classList.add("isPlanning");

          tr_act.classList.add("isActual");
        }

        tbody.appendChild(tr_act);
