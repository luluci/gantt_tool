    }

    state.data.domains.forEach((dom) => {
      addDPVRow(dom.name, dom, "domain");
      (dom.projects || []).forEach((pr) => {
        addDPVRow(pr.name, pr, "project");
        (pr.versions || []).forEach((vr) => {
          addDPVRow(vr.name, vr, "version");
          (vr.tasks || []).forEach((tk) => {
            appendTaskPlanRows(dom, pr, vr, tk);
          });
        });
      });
    });

    const stage = document.createElement("div");
    stage.className = "ganttStage";
    stage.appendChild(tbl);
    const lineLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    lineLayer.setAttribute("class", "commentLineLayer");
    commentLayer = document.createElement("div");
    commentLayer.className = "commentLayer";
    milestoneLineLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    milestoneLineLayer.setAttribute("class", "milestoneLineLayer commentLineLayer");
    milestoneLayer = document.createElement("div");
    milestoneLayer.className = "milestoneLayer commentLayer";
    stage.appendChild(lineLayer);
    stage.appendChild(commentLayer);
    stage.appendChild(milestoneLineLayer);
    stage.appendChild(milestoneLayer);

    function clampCommentPos(x, y, cardW, cardH) {
      const maxX = Math.max(0, stage.offsetWidth - cardW - 4);
      const maxY = Math.max(0, stage.offsetHeight - cardH - 4);
      return { x: Math.min(Math.max(0, x), maxX), y: Math.min(Math.max(0, y), maxY) };
    }

    function drawCommentOverlay() {
      const showAll = state.commentDisplayMode === "always";
      const refs = showAll
        ? commentRefs
        : commentRefs.filter((r) => r.key === state.commentContextKey);
      commentLayer.innerHTML = "";
      while (lineLayer.firstChild) lineLayer.removeChild(lineLayer.firstChild);
      const rect = stage.getBoundingClientRect();
      lineLayer.setAttribute("width", String(stage.offsetWidth));
      lineLayer.setAttribute("height", String(stage.offsetHeight));
      lineLayer.style.width = stage.offsetWidth + "px";
      lineLayer.style.height = stage.offsetHeight + "px";
      commentLayer.style.width = stage.offsetWidth + "px";
      commentLayer.style.height = stage.offsetHeight + "px";
      milestoneLineLayer.setAttribute("width", String(stage.offsetWidth));
      milestoneLineLayer.setAttribute("height", String(stage.offsetHeight));
      milestoneLineLayer.style.width = stage.offsetWidth + "px";
      milestoneLineLayer.style.height = stage.offsetHeight + "px";
      milestoneLayer.style.width = stage.offsetWidth + "px";
      milestoneLayer.style.height = stage.offsetHeight + "px";
      refs.forEach((ref) => {
        let text;
        if (ref.kind === "milestone") {
          text = getMilestoneComment(ref.target);
        } else {
          text = ref.date ? getCellComment(ref.target, ref.date) : getNodeComment(ref.target);
        }
        if (!text.trim()) return;
        const dotR = ref.dot.getBoundingClientRect();
        const dotX = dotR.left - rect.left + dotR.width / 2;
        const dotY = dotR.top - rect.top + dotR.height / 2;
        const card = document.createElement("div");
        card.className = ref.date ? "commentCard" : "nodeCommentCard";
        card.textContent = text;
        let saved;
        if (ref.kind === "milestone") {
          milestoneLayer.appendChild(card);
          saved = getMilestoneCommentPos(ref.target);
        } else {
          commentLayer.appendChild(card);
          saved = ref.date ? getCellCommentPos(ref.target, ref.date) : getNodeCommentPos(ref.target);
        }
        const cw = card.offsetWidth;
        const ch = card.offsetHeight;
        // 相対座標を絶対座標に変換
        const baseX = saved ? dotX + saved.x : dotX + 12;
        const baseY = saved ? dotY + saved.y : dotY - 38;
        const pos = clampCommentPos(baseX, baseY, cw, ch);
        card.style.left = pos.x + "px";
        card.style.top = pos.y + "px";

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("stroke-width", "1.2");
        line.setAttribute("stroke-opacity", "0.9");
        if (ref.kind === "milestone") {
          line.setAttribute("stroke", "#ff9800");
          milestoneLineLayer.appendChild(line);
        } else {
          line.setAttribute("stroke", "#b0293a");
          lineLayer.appendChild(line);
        }
        const updateLine = () => {
          const cx = parseFloat(card.style.left) || 0;
          const cy = parseFloat(card.style.top) || 0;
          line.setAttribute("x1", String(dotX));
          line.setAttribute("y1", String(dotY));
          line.setAttribute("x2", String(cx));
          line.setAttribute("y2", String(cy + 10));
        };
        updateLine();

        card.addEventListener("pointerdown", (ev) => {
          if (ev.button !== 0) return;
          ev.preventDefault();
          ev.stopPropagation();
          const sx = ev.clientX;
          const sy = ev.clientY;
          const ox = parseFloat(card.style.left) || 0;
          const oy = parseFloat(card.style.top) || 0;
          card.setPointerCapture(ev.pointerId);
          const onMv = (mv) => {
            const nx = ox + (mv.clientX - sx);
            const ny = oy + (mv.clientY - sy);
            const cl = clampCommentPos(nx, ny, cw, ch);
            card.style.left = cl.x + "px";
            card.style.top = cl.y + "px";
            updateLine();
          };
          const onUp = (up) => {
            card.releasePointerCapture(up.pointerId);
            card.removeEventListener("pointermove", onMv);
            card.removeEventListener("pointerup", onUp);
            const px = parseFloat(card.style.left) || 0;
            const py = parseFloat(card.style.top) || 0;
            // 絶対座標を相対座標に変換して保存
            const relX = px - dotX;
            const relY = py - dotY;
            if (ref.kind === "milestone") {
              setMilestoneCommentPos(ref.target, { x: relX, y: relY });
            } else if (ref.date) {
              setCellCommentPos(ref.target, ref.date, { x: relX, y: relY });
            } else {
              setNodeCommentPos(ref.target, { x: relX, y: relY });
            }
            markDirty(state, true);
            renderGantt(dates);
          };
          card.addEventListener("pointermove", onMv);
          card.addEventListener("pointerup", onUp);
        });
      });
    }

    ganttVScroll.innerHTML = "";
    ganttVScroll.appendChild(stage);
    drawCommentOverlay();
  }

  function actualHoursOnDate(pl, ds, state) {
    const tot = Number((pl.phaseHours.all && pl.phaseHours.all.actual) || 0);
    if (tot <= 0) return 0;
    if (!pl.actualStart || !pl.actualEnd) return 0;
    if (daysBetween(pl.actualStart, ds) >= 0 && daysBetween(ds, pl.actualEnd) >= 0) {
      const span = Math.max(1, daysBetween(pl.actualStart, pl.actualEnd) + 1);
      return tot / span;
    }
    return 0;
  }

  function inputCellUtil(plan, ds, cellKind) {
    const cells = getCellsByKind(plan, cellKind);
    const cell = cells[ds] || (cells[ds] = {});
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    const curU = effectiveCellUtil(plan, ds, cellKind);

    // クリックされたセル要素を検索
    const kind = cellKind === cellKindPlan ? "plan" : "actual";
    const td = ganttVScroll.querySelector('td.daycell[data-plan-id="' + plan.id + '"][data-date="' + ds + '"][data-cell-kind="' + kind + '"]');
    const spn = td.querySelector('span');
    const curText = spn.textContent;
    spn.textContent = String(curU);
    spn.contentEditable = "true";
    spn.focus();
    // テキストを全選択
    document.execCommand("selectAll", false, null);
    const onChange = () => {
      const new_txt = spn.textContent.trim();
      // 入力値を数値として解析
      let val = Number(new_txt);
      if (isNaN(val)) {
        alert("有効な数値を入力してください（0で削除）");
        spn.textContent = String(curU);
        spn.focus();
        return;
      }
      //
      spn.removeEventListener("blur", onChange);
      spn.removeEventListener("keydown", onKey);
      // 空白で0扱い
      if (new_txt === "") {
        val = 0;
      }
      //
      if (val < 1e-5) {
        delete cell.util;
      } else {
        if (val != plan.utilization) {
          cell.util.value = val;
        } else {
          delete cell.util.value;
        }
      }
      if (Object.keys(cell).length === 0) {
        delete cells[ds];
      }
      spn.contentEditable = "false";
      updatePlanCellDomByData(plan, ds, cells[ds] || cell, null, cellKind);
      recomputeAllPhaseFromCells(plan);
      plan.plannedEnd = computePlannedEnd(plan, state);
      markDirty(state, true);
      syncLeftPanePlanSummaryDom(plan.id, plan.isPlanOrActual);
      refreshManhoursRowsDom([ds]);
    };
    spn.addEventListener("blur", onChange);
    // Enterキーで確定、Escキーでキャンセル
    const onKey = (e) => {
      if (e.key === "Enter") {
        onChange();
      } else if (e.key === "Escape") {
        spn.textContent = curText;
        spn.contentEditable = "false";
      }
    }
    spn.addEventListener("keydown", onKey);

    markDirty(state, true);
  }

  function cycleCellUtil(plan, ds) {
    const cell = plan.cells[ds] || (plan.cells[ds] = {});
    const u0 = plan.utilization == null ? 1 : Number(plan.utilization);
    const seq = [0.5, 1, 1.5, 2, u0];
    const curU = effectiveCellUtil(plan, ds, cellKindPlan);
    const idx = seq.findIndex((u) => Math.abs(u - curU) < 1e-5);
    const next = seq[(Math.max(0, idx) + 1) % seq.length];
    if (Math.abs(next - u0) < 1e-5) {
      if (typeof cell === "object") delete cell.util;
      if (Object.keys(cell).length === 0) delete plan.cells[ds];
    } else if (typeof cell === "object") cell.util = next;
    markDirty(state, true);
  }

  function onCellPointerDown(e, pl, ds, dates, cellKind) {
    if (e.button !== 0) return;
    const td = e.currentTarget;
    const rect = td.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const blk = contiguousBlock(pl, ds, state, dates, cellKind);
    const mode = planCellInteractionMode(pl, ds, x, rect.width, dates, cellKind);
    const srcCells = getCellsByKind(pl, cellKind);
    const startCell = srcCells[ds];
    const startHasUtil = !!(startCell?.util?.value);
    const startUtil = startCell?.util?.value || pl.utilization;
    state.drag = {
      mode,
      planId: pl.id,
      cellKind,
      startDate: ds,
      block: blk,
      startX: e.clientX,
      startHasUtil,
      startUtil,
      orig: cloneCells(srcCells),
      draftCells: cloneCells(srcCells),
      frozenDates: dates.slice(),
      lastStep: 0,
      changed: false,
      dragMoved: false,
      touchedDates: new Set(),
      cellDomCache: buildPlanCellDomCache(pl.id, dates),
    };
    td.setPointerCapture(e.pointerId);
    const pln = findPlan(state, pl.id);
    const onMove = (ev) => {
      const dg0 = state.drag;
      if (!dg0) return;
      if (dg0.mode === "click") {
        if (Math.abs(ev.clientX - dg0.startX) > 4) dg0.dragMoved = true;
        return;
      }
      dg0.dragMoved = true;
      onCellPointerMove(ev, pln);
    };
    const updateStartDate = () => {
      const minCellDate = earliestInputCellDate(pln, pln.isPlanOrActual);
      if (pln.isPlanOrActual == cellKindPlan) {
        if (minCellDate) pln.plannedStart = minCellDate;
      } else {
        if (minCellDate) pln.actualStart = minCellDate;
      }
    }
    const onUp = (ev) => {
      td.releasePointerCapture(ev.pointerId);
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      const dg = state.drag;
      if (dg && pln) {
        if (dg.mode === MOUSE_EV_MODE_CLICK && !dg.dragMoved && pln) {
          const plnCells = getCellsByKind(pln, dg.cellKind);
          if (!cellIsOn(pln, ds, dg.cellKind)) {
            // セルがオフ->オン:稼働率はプラン全体の稼働率をセット
            const util0 = pln.utilization == null ? 1 : Number(pln.utilization);
            let cell = plnCells[ds];
            if (!cell || typeof cell !== "object" || cell === true) cell = {};
            if (!cell.util) cell.util = {};
            plnCells[ds] = cell;
            updatePlanCellDomByData(pln, ds, plnCells[ds], dg.cellDomCache, dg.cellKind);
            updateStartDate();
            recomputeAllPhaseFromCells(pln);
            pln.plannedEnd = computePlannedEnd(pln, state);
            markDirty(state, true);
            syncLeftPanePlanSummaryDom(pln.id, pln.isPlanOrActual);
            refreshManhoursRowsDom([ds]);
            if (dg.cellKind === cellKindPlan && shouldRefreshGanttNearRangeEdge(pln, dg.frozenDates || dates || [], pln.cells)) renderGantt();
          }
        } else if (dg.mode === MOUSE_EV_MODE_MOVE && !dg.dragMoved && cellIsOn(pln, ds, dg.cellKind)) {
          // セル移動なし:クリックのみ:稼働率処理
          inputCellUtil(pln, ds, dg.cellKind);
          recomputeAllPhaseFromCells(pln);
          pln.plannedEnd = computePlannedEnd(pln, state);
        } else if (dg.changed) {
          // ドラッグ変更範囲日時を配列として作成
          const changedDates = [];
          const targetCells = getCellsByKind(pln, dg.cellKind);
          const mergedDates = new Set([...Object.keys(targetCells || {}), ...Object.keys(dg.draftCells || {})]);
          mergedDates.forEach((ds) => {
            changedDates.push(ds);
          });

          if (dg.cellKind === cellKindActual) pln.actualCells = dg.draftCells;
          else pln.cells = dg.draftCells;
          const committedCells = getCellsByKind(pln, dg.cellKind);
          applyPlanCellsDomDiff(pln, dg.orig, committedCells, dg.frozenDates || [], dg.cellDomCache, dg.cellKind);
          updateStartDate();
          recomputeAllPhaseFromCells(pln);
          pln.plannedEnd = computePlannedEnd(pln, state);
          markDirty(state, true);
          syncLeftPanePlanSummaryDom(pln.id, pln.isPlanOrActual);
          refreshManhoursRowsDom(changedDates);
          if (dg.cellKind === cellKindPlan && shouldRefreshGanttNearRangeEdge(pln, dg.frozenDates || dates || [], pln.cells)) renderGantt();
        }
      }
      state.drag = null;
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }

  function onCellPointerMove(e, pl) {
    const dg = state.drag;
    if (!dg || !pl || dg.planId !== pl.id) return;
    const dates = dg.frozenDates && dg.frozenDates.length ? dg.frozenDates : getDateRange(state);
    const dayW = 28;
    const dx = e.clientX - dg.startX;
    const step = Math.round(dx / dayW);
    if (step === dg.lastStep) return;

    const { startIdx, endIdx } = dg.block || {};
    if (startIdx == null || endIdx == null) return;

    const prevDraft = dg.draftCells || cloneCells(dg.orig || {});
    const nextCells = cloneCells(dg.orig || {});
    let changed = false;

    if (dg.mode === MOUSE_EV_MODE_MOVE) {
      const targets = [];
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (!dg.orig[k]) continue;
        const ti = shiftIndexByBusinessDays(dates, di, step, pl, state);
        if (ti < 0) return;
        targets.push({ src: di, dst: ti });
      }
      for (let di = startIdx; di <= endIdx; di++) {
        const k = dates[di];
        if (dg.orig[k]) {
          if (nextCells[k].util) {
            delete nextCells[k].util;
          }
          if (Object.keys(nextCells[k]).length === 0) {
            delete nextCells[k];
          }
        }
      }
      for (let i = 0; i < targets.length; i++) {
        const srcKey = dates[targets[i].src];
        const dstKey = dates[targets[i].dst];
        const cell = dg.orig[srcKey];
        if (!cell) continue;
        //nextCells[dstKey] = JSON.parse(JSON.stringify(cell));
        if (!cell.util || typeof cell.util !== "object" || cell.util === true) {
          delete nextCells[dstKey].util;
          if (Object.keys(nextCells[dstKey]).length === 0) {
            delete nextCells[dstKey];
          }
        } else {
          if (!cell.util.value) {
            if (!nextCells[dstKey] || typeof nextCells[dstKey] !== "object" || nextCells[dstKey] === true) nextCells[dstKey] = { util: {} };
            else nextCells[dstKey].util = {};
          } else {
            if (!nextCells[dstKey] || typeof nextCells[dstKey] !== "object" || nextCells[dstKey] === true) nextCells[dstKey] = { util: { value: cell.util.value } };
            else nextCells[dstKey].util = { value: cell.util.value };
          }
        }
      }
      changed = step !== 0;
    } else if (dg.mode === MOUSE_EV_MODE_RESIZE_LEFT) {
      const si = startIdx;
      const ei = endIdx;
      if (step > 0) {
        const nextSi = shiftIndexByBusinessDays(dates, si, step, pl, state);
        if (nextSi < 0) return;
        for (let di = si; di < nextSi && di <= ei; di++) {
          clearInputCell(nextCells, dates[di]);
        }
      } else if (step < 0) {
        let addIdx = si;
        let need = -step;
        while (need > 0) {
          addIdx--;
          if (addIdx < 0) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          const util0 = pl.utilization == null ? 1 : Number(pl.utilization);

          let nextCell = nextCells[dates[addIdx]];
          if (!nextCell || typeof nextCell !== "object" || nextCell === true) nextCell = {};
          nextCell.util = {};
          if (dg.startHasUtil) nextCell.util.value = dg.startUtil;
          nextCells[dates[addIdx]] = nextCell;

          need--;
        }
      }
      changed = step !== 0;
    } else if (dg.mode === MOUSE_EV_MODE_RESIZE_RIGHT) {
      const si = startIdx;
      const ei = endIdx;
      if (step < 0) {
        const nextEi = shiftIndexByBusinessDays(dates, ei, step, pl, state);
        if (nextEi < 0) return;
        for (let di = ei; di > nextEi && di >= si; di--) {
          clearInputCell(nextCells, dates[di]);
        }
      } else if (step > 0) {
        let addIdx = ei;
        let need = step;
        while (need > 0) {
          addIdx++;
          if (addIdx >= dates.length) return;
          if (isHolidayDate(dates[addIdx], pl, state)) continue;
          const util0 = pl.utilization == null ? 1 : Number(pl.utilization);

          let nextCell = nextCells[dates[addIdx]];
          if (!nextCell || typeof nextCell !== "object" || nextCell === true) nextCell = {};
          nextCell.util = {};
          if (dg.startHasUtil) nextCell.util.value = dg.startUtil;
          nextCells[dates[addIdx]] = nextCell;
          
          need--;
        }
      }
      changed = step !== 0;
    } else {
      return;
    }

    const touched = applyPlanCellsDomDiff(pl, prevDraft, nextCells, dates, dg.cellDomCache, dg.cellKind);
    dg.touchedDates = touched;
    dg.draftCells = nextCells;
    dg.lastStep = step;
    dg.changed = changed;
  }

  async function saveData() {
    // file:// で開いた場合、ブラウザによっては File System Access API が制限されることがある
    // htmlファイル名からjsファイル名を生成する場合
    // const htmlFileName = location.pathname.split('/').pop() || "gantt.html";
    // const nameWithoutExt = htmlFileName.substring(0, htmlFileName.lastIndexOf('.')) || htmlFileName;
    // const dataFileName = nameWithoutExt + '.js';

    // domからsrc="gantt(<variable>).js"が指定されているscriptタグを検索してsrc属性の値を取得する
    const ganttScriptTag = document.querySelector('script[src*="gantt"]');
    const dataFileNameEnc = ganttScriptTag.src?.split('/').pop() || "gantt.js";
    // パーセントエンコーディングをデコード
    const dataFileName = decodeURIComponent(dataFileNameEnc);

    const text = serializeJs(cloneForSave(state.data));
    try {
      if (isWri() && wri && wri.io && wri.io.file && wri.io.file.SaveTo) {
        const htmlPath = wri.SourceDirectoryPath;
        const filePath = wri.io.path.Combine(htmlPath, dataFileName);
        wri.io.file.SaveTo(filePath, text);
      } else if (window.showSaveFilePicker) {
        const handle = state.fileHandle || await window.showSaveFilePicker({
          suggestedName: dataFileName,
          types: [{ description: "JS", accept: { "application/javascript": [".js"] } }],
        });
        const w = await handle.createWritable();
        await w.write(text);
        await w.close();
        state.fileHandle = handle;
      } else {
        alert("この環境では File System Access API が使えません。");
        return;
      }
      markDirty(state, false);
      alert("保存しました。");
      renderTop();
    } catch (err) {
      console.error(err);
      alert("保存に失敗しました: " + (err && err.message ? err.message : String(err)));
    }
  }

  function saveViewer() {
    try {
      // htmlファイル名からjsファイル名を生成する場合
      const htmlFileName = location.pathname.split('/').pop() || "gantt.html";
      const nameWithoutExt = htmlFileName.substring(0, htmlFileName.lastIndexOf('.')) || htmlFileName;
      const dataFileName = decodeURIComponent(nameWithoutExt) + "_viewer.html";

      // 現在のHTMLファイルの内容をテキストとして取得
      topPane.innerHTML = "";
      leftPane.innerHTML = "";
      ganttVScroll.innerHTML = "";
      let htmlText = document.documentElement.outerHTML;
      
      // gantt.jsを参照するscriptタグを削除（正規表現を使用）
      htmlText = htmlText.replace(/<script[^>]*src[^>]*gantt(?:_.+)?\.js[^>]*><\/script>/gi, "");
      
      // データをJSON化
      const jsonData = JSON.stringify(state.data, null, 2);
      
      // 埋め込むスクリプトコード（エスケープなし）
      const dataScript = "window.__GANTT_DATA__ = " + jsonData + ";\nwindow.__GANTT_VIEWER_MODE__ = true;";
      
      // window.__GANTT_DATA__ 初期化スクリプトの直後に新しいスクリプトを挿入
      const initScriptPattern = /window\.__GANTT_DATA__ = null;/;
      
      if (initScriptPattern.test(htmlText)) {
        // 初期化スクリプトが見つかった場合、その直後に挿入
        htmlText = htmlText.replace(
          initScriptPattern,
          (match) => dataScript + "\n"
        );
      } else {
        // 見つからない場合は警告を表示して終了
        alert("初期化スクリプトが見つかりませんでした。データは埋め込まれません。");
        return;
      }

      const initViewModePattern = /window\.__GANTT_VIEWER_MODE__ = false;/;
      if (initViewModePattern.test(htmlText)) {
        // 初期化が見つかった場合削除
        htmlText = htmlText.replace(
          initViewModePattern,
          (match) => ""
        );
      }

      // fix
      htmlText = "<!DOCTYPE html>\n" + htmlText;
      
      // HTMLをBlob化
      const blob = new Blob([htmlText], { type: "text/html; charset=utf-8" });
      const url = URL.createObjectURL(blob);
      
      // ダウンロードリンクを作成
      const link = document.createElement("a");
      link.href = url;
      link.download = dataFileName;
      
      // ダウンロード実行
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      // リソース解放
      setTimeout(() => URL.revokeObjectURL(url), 100);
      
      alert("Viewer保存完了: " + dataFileName);

      renderAll();
    } catch (err) {
      console.error(err);
      alert("Viewer保存に失敗しました: " + (err && err.message ? err.message : String(err)));
    }
  }

  function saveNamedData() {
    const name = prompt("ガントチャートツール名を入力してください:", "");
    if (!name || !name.trim()) return;
    
    // const safeName = name.trim().replace(/[^a-zA-Z0-9_-]/g, "_");
    const safeName = name.trim();
    const htmlFileName = "gantt_" + safeName + ".html";
    const dataFileName = "gantt_" + safeName + ".js";
    
    try {
      // 1. データファイルを保存
      const jsText = serializeJs(cloneForSave(state.data));
      const jsBlob = new Blob([jsText], { type: "application/javascript; charset=utf-8" });
      const jsUrl = URL.createObjectURL(jsBlob);
      
      const jsLink = document.createElement("a");
      jsLink.href = jsUrl;
      jsLink.download = dataFileName;
      document.body.appendChild(jsLink);
      jsLink.click();
      document.body.removeChild(jsLink);
      
      setTimeout(() => URL.revokeObjectURL(jsUrl), 100);
      
      // 2. HTMLファイルを保存（修正後）
      topPane.innerHTML = "";
      leftPane.innerHTML = "";
      ganttVScroll.innerHTML = "";
      let htmlText = document.documentElement.outerHTML;
      
      // gantt.jsの参照を gantt_xxx.js に変更
      htmlText = htmlText.replace(
        /src="gantt(?:_.+)?\.js"/g,
        'src="' + dataFileName + '"'
      );
      
      // fix
      htmlText = "<!DOCTYPE html>\n" + htmlText;
      
      const htmlBlob = new Blob([htmlText], { type: "text/html; charset=utf-8" });
      const htmlUrl = URL.createObjectURL(htmlBlob);
      
      const htmlLink = document.createElement("a");
      htmlLink.href = htmlUrl;
      htmlLink.download = htmlFileName;
      document.body.appendChild(htmlLink);
      htmlLink.click();
      document.body.removeChild(htmlLink);
      
      setTimeout(() => URL.revokeObjectURL(htmlUrl), 100);
      
      alert("名前付き保存完了:\n" + htmlFileName + "\n" + dataFileName);
      renderAll();
    } catch (err) {
      console.error(err);
      alert("名前付き保存に失敗しました: " + (err && err.message ? err.message : String(err)));
    }
  }

  function renderAll() {
    ensurePhaseKeys(state);
    eachPlan(state, (pl) => {
      recomputeAllPhaseFromCells(pl);
      pl.plannedEnd = computePlannedEnd(pl, state);
    });
    document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    if (state.topPaneHeight == null) {
      document.documentElement.style.setProperty("--topH", "auto");
    } else {
      const appRect = appRoot.getBoundingClientRect();
      const minTop = 80;
      const maxTop = Math.max(minTop, appRect.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
    topPane.classList.toggle("hidden", !state.topPaneVisible);
    hResizer.classList.toggle("hidden", !state.topPaneVisible);
    leftPane.classList.toggle("hidden", !state.inputPaneVisible);
    resizer.classList.toggle("hidden", !state.inputPaneVisible);
    renderTop();
    renderInputPane();
    renderGantt();
  }

  let resizingX = false;
  let resizingY = false;
  resizer.addEventListener("mousedown", (e) => {
    resizingX = true;
    e.preventDefault();
  });
  hResizer.addEventListener("mousedown", (e) => {
    resizingY = true;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (resizingX) {
      const r = bottomPane.getBoundingClientRect();
      state.leftPaneWidth = Math.min(Math.max(e.clientX - r.left, 200), r.width * 0.7);
      document.documentElement.style.setProperty("--leftW", state.leftPaneWidth + "px");
    }
    if (resizingY) {
      const r = appRoot.getBoundingClientRect();
      const minTop = 40;
      const maxTop = Math.max(minTop, r.height * 0.7);
      state.topPaneHeight = Math.min(Math.max(e.clientY - r.top, minTop), maxTop);
      document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
    }
  });
  window.addEventListener("mouseup", () => {
    resizingX = false;
    resizingY = false;
  });
  window.addEventListener("resize", () => {
    if (state.topPaneHeight == null) return;
    const r = appRoot.getBoundingClientRect();
    const minTop = 80;
    const maxTop = Math.max(minTop, r.height * 0.7);
    state.topPaneHeight = Math.min(Math.max(state.topPaneHeight, minTop), maxTop);
    document.documentElement.style.setProperty("--topH", state.topPaneHeight + "px");
  });

  window.addEventListener("beforeunload", (e) => {
    if (state.dirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
  window.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
      e.preventDefault();
      saveData();
    }
  });

  initData();
  renderAll();
})();
  </script>
